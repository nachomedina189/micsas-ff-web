<!DOCTYPE html>
<html lang="ca" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuina · micsas.ff</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="cocina.webmanifest">
  <link rel="apple-touch-icon" href="logo micsas.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cuina">
  <meta name="theme-color" content="#0F1115">
  <meta name="color-scheme" content="dark">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0F1115] text-[#E8EAED] font-['Inter',sans-serif] antialiased min-h-screen">

  <!-- ════ LOGIN SCREEN ════ -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-[#F7F8FA] text-[#14171C] rounded-2xl shadow-2xl p-8 space-y-5">
      <div class="text-center">
        <h1 class="font-black tracking-tight text-3xl">Cuina</h1>
        <p class="text-sm text-[#6B7280] mt-1">micsas.ff · panell intern</p>
      </div>
      <div class="space-y-3">
        <input id="login-email" type="email" placeholder="Email" autocomplete="username"
          class="w-full bg-white border border-[#D1D5DB] rounded-xl px-4 py-3 text-sm outline-none focus:border-[#2563EB] focus:ring-1 focus:ring-[#2563EB]">
        <input id="login-password" type="password" placeholder="Contrasenya" autocomplete="current-password"
          class="w-full bg-white border border-[#D1D5DB] rounded-xl px-4 py-3 text-sm outline-none focus:border-[#2563EB] focus:ring-1 focus:ring-[#2563EB]">
      </div>
      <p id="login-error" class="hidden text-xs text-[#DC2626] text-center"></p>
      <button id="login-btn" onclick="doLogin()"
        class="w-full py-3.5 rounded-xl font-semibold text-[15px] text-white bg-[#2563EB] hover:bg-[#1D4ED8] transition-all shadow-sm">
        Entrar
      </button>
    </div>
  </div>

  <!-- ════ KITCHEN SCREEN ════ -->
  <div id="kitchen-screen" class="hidden min-h-screen">
    <header class="sticky top-0 z-20 flex items-center justify-between px-6 py-4 bg-[#15181D] border-b border-white/8">
      <div class="flex items-center gap-3">
        <h1 class="font-black tracking-tight text-2xl">Comandes</h1>
        <span id="order-count" class="px-2.5 py-1 rounded-full bg-white/10 text-xs font-bold"></span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 pr-3 border-r border-white/10">
          <button onclick="setDateScope('today')" id="scope-today" class="px-4 py-2 rounded-lg text-sm font-semibold border border-white/15 transition-all">Avui (pase)</button>
          <button onclick="setDateScope('week')" id="scope-week" class="px-4 py-2 rounded-lg text-sm font-semibold border border-white/15 transition-all">Setmana</button>
        </div>
        <button onclick="openHistory()" class="px-4 py-2 rounded-lg text-sm font-semibold border border-white/15 hover:bg-white/5 transition-all">Historial</button>
        <button onclick="doLogout()" class="px-4 py-2 rounded-lg text-sm font-semibold text-[#8B93A1] hover:text-[#E8EAED] transition-colors">
          Sortir
        </button>
      </div>
    </header>

    <!-- ════ TABLER (KANBAN): Sense afegir → Preparant ════ -->
    <main class="p-6 grid gap-6 grid-cols-1 md:grid-cols-2 items-start">
      <section class="bg-[#15181D] rounded-2xl p-4 md:p-5 border-t-4 border-[#F59E0B] border-x border-b border-white/8">
        <h2 class="flex items-center gap-2 font-black text-lg uppercase tracking-wide mb-4">
          <span class="w-2.5 h-2.5 rounded-full bg-[#F59E0B]"></span> Sense afegir
          <span id="count-pending" class="ml-auto px-2.5 py-0.5 rounded-full bg-[#F59E0B]/15 text-[#F59E0B] text-sm font-bold">0</span>
        </h2>
        <div id="col-pending" class="space-y-4"></div>
      </section>
      <section class="bg-[#15181D] rounded-2xl p-4 md:p-5 border-t-4 border-[#3B82F6] border-x border-b border-white/8">
        <h2 class="flex items-center gap-2 font-black text-lg uppercase tracking-wide mb-4">
          <span class="w-2.5 h-2.5 rounded-full bg-[#3B82F6]"></span> Preparant
          <span id="count-preparing" class="ml-auto px-2.5 py-0.5 rounded-full bg-[#3B82F6]/15 text-[#3B82F6] text-sm font-bold">0</span>
        </h2>
        <div id="col-preparing" class="space-y-4"></div>
      </section>
    </main>
    <p id="orders-empty" class="hidden text-center text-[#5B6270] py-24 text-lg">No hi ha comandes ara mateix.</p>
  </div>

  <!-- ════ HISTORIAL (modal) ════ -->
  <div id="history-modal" class="hidden fixed inset-0 z-[900] bg-black/60 flex items-end md:items-center justify-center">
    <div class="bg-[#F7F8FA] text-[#14171C] w-full md:max-w-2xl md:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between px-6 py-4 border-b border-[#E5E7EB] shrink-0">
        <h2 class="font-black tracking-tight text-2xl">Historial</h2>
        <button onclick="closeHistory()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#E5E7EB] text-[#6B7280] hover:text-[#14171C] transition-colors">✕</button>
      </div>
      <div class="px-6 py-3 border-b border-[#E5E7EB] flex items-center gap-3 flex-wrap shrink-0">
        <label class="text-xs font-semibold text-[#6B7280]">Des de</label>
        <input type="date" id="history-from" onchange="renderHistoryList()"
          class="bg-white border border-[#D1D5DB] rounded-lg px-3 py-1.5 text-sm outline-none focus:border-[#2563EB]">
        <label class="text-xs font-semibold text-[#6B7280]">Fins a</label>
        <input type="date" id="history-to" onchange="renderHistoryList()"
          class="bg-white border border-[#D1D5DB] rounded-lg px-3 py-1.5 text-sm outline-none focus:border-[#2563EB]">
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto p-6 space-y-3"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    window.supabase = supabase; // permite depurar consultas desde la consola

    // Tauler de 2 etapes actives (com un monitor de cuina tipus McDonald's):
    // "pending" = encara no introduït a Aronium; "preparing"/"ready" = ja
    // introduït i en marxa. En marcar "Llest" la comanda passa directament a
    // "delivered" i desapareix del tauler — només queda consultable a l'Historial.
    const STATUS_LABEL = { pending: 'Sense afegir', preparing: 'Preparant', ready: 'Preparant', delivered: 'Entregat', cancelled: 'Cancel·lat' };

    let currentDateScope = 'today';
    let ordersCache = [];

    function fmt(n) { return (Number(n) || 0).toFixed(2).replace('.', ',') + ' €'; }
    function todayISO() { return new Date().toISOString().split('T')[0]; }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Entrant...';
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Entrar';
      if (error) {
        errEl.textContent = 'Email o contrasenya incorrectes.';
        errEl.classList.remove('hidden');
        return;
      }
      await checkAccessAndStart();
    }
    window.doLogin = doLogin;

    async function doLogout() {
      await supabase.auth.signOut();
      location.reload();
    }
    window.doLogout = doLogout;

    function setDateScope(s) {
      currentDateScope = s;
      document.getElementById('scope-today').classList.toggle('bg-white', s === 'today');
      document.getElementById('scope-today').classList.toggle('text-[#14171C]', s === 'today');
      document.getElementById('scope-week').classList.toggle('bg-white', s === 'week');
      document.getElementById('scope-week').classList.toggle('text-[#14171C]', s === 'week');
      renderOrders();
    }
    window.setDateScope = setDateScope;

    async function checkAccessAndStart() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;
      // RLS already restricts orders to staff-only, but probe once to give a clear message
      const { data, error } = await supabase.from('orders').select('id').limit(1);
      if (error) {
        document.getElementById('login-error').textContent = 'Error consultant comandes: ' + error.message;
        document.getElementById('login-error').classList.remove('hidden');
        return;
      }
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('kitchen-screen').classList.remove('hidden');
      setDateScope('today');
      await loadOrders();
      subscribeRealtime();
    }

    async function loadOrders() {
      const { data, error } = await supabase
        .from('orders')
        .select('*, customers(name, phone, email), addresses(street, floor, postal_code, city, notes), order_items(*)')
        .order('created_at', { ascending: true });
      if (error) { console.error(error); return; }
      ordersCache = data || [];
      renderOrders();
    }

    function subscribeRealtime() {
      supabase
        .channel('cocina-orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadOrders())
        .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' }, () => loadOrders())
        .subscribe();
    }

    function inDateScope(o) {
      const today = todayISO();
      if (currentDateScope === 'today') return o.delivery_date === today;
      if (currentDateScope === 'week') {
        const d = new Date(); d.setDate(d.getDate() + 6);
        const weekEndStr = d.toISOString().split('T')[0];
        return !!o.delivery_date && o.delivery_date >= today && o.delivery_date <= weekEndStr;
      }
      return true;
    }

    function renderOrders() {
      const board = ordersCache.filter(o => inDateScope(o) && o.status !== 'delivered' && o.status !== 'cancelled');
      const groups = groupOrders(board);
      const pendingGroups   = groups.filter(g => stageOfGroup(g) === 'pending');
      const preparingGroups = groups.filter(g => stageOfGroup(g) === 'preparing');

      document.getElementById('order-count').textContent = groups.length;
      document.getElementById('count-pending').textContent = pendingGroups.length;
      document.getElementById('count-preparing').textContent = preparingGroups.length;

      const empty = document.getElementById('orders-empty');
      empty.classList.toggle('hidden', groups.length > 0);

      const noneMsg = '<p class="text-sm text-[#5B6270] text-center py-10">Cap comanda</p>';
      document.getElementById('col-pending').innerHTML   = pendingGroups.length   ? pendingGroups.map(renderOrderCard).join('')   : noneMsg;
      document.getElementById('col-preparing').innerHTML = preparingGroups.length ? preparingGroups.map(renderOrderCard).join('') : noneMsg;
    }

    // Agrupa pedidos del mateix client (per telèfon) per a la mateixa
    // delivery_date + slot_time — perquè el pizzero vegi d'un cop tot el que
    // s'ha de preparar/portar juntament, encara que siguin comandes (i pagaments)
    // separats a l'hora d'introduir-los a Aronium.
    function groupOrders(list) {
      const map = new Map();
      list.forEach(o => {
        const phone = (o.customers && o.customers.phone) || ('sense-tel-' + o.id);
        const key = phone + '__' + o.delivery_date + '__' + o.slot_time;
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(o);
      });
      return Array.from(map.values());
    }

    // Etapa visual d'una comanda individual: pending = encara no afegida a
    // Aronium; qualsevol altra (preparing/ready) = ja en marxa.
    function stageOf(o) { return o.status === 'pending' ? 'pending' : 'preparing'; }
    // Etapa d'un grup: si encara queda alguna comanda sense afegir, el grup
    // sencer es mostra a la columna "Sense afegir" (amb botons individuals).
    function stageOfGroup(group) { return group.some(o => o.status === 'pending') ? 'pending' : 'preparing'; }

    function actionsRow(ids, stage, size) {
      const pad = size === 'sm' ? 'py-2 text-xs' : 'py-3 text-sm';
      const idsJs = ids.join("','");
      const nextStatus = stage === 'pending' ? 'preparing' : 'delivered';
      const nextLabel  = stage === 'pending' ? 'Afegit a Aronium' : 'Llest';
      const nextColor  = stage === 'pending' ? 'bg-[#2563EB] hover:bg-[#1D4ED8]' : 'bg-[#16A34A] hover:bg-[#15803D]';
      return `
        <div class="flex gap-2">
          <button onclick="advanceStatusBulk(['${idsJs}'],'${nextStatus}')" class="flex-1 ${pad} rounded-lg ${nextColor} text-white font-semibold transition-all">${nextLabel}</button>
          <button onclick="advanceStatusBulk(['${idsJs}'],'cancelled')" class="px-4 ${pad} rounded-lg border border-[#D1D5DB] text-[#6B7280] hover:border-[#DC2626]/40 hover:text-[#DC2626] transition-all">✕</button>
        </div>`;
    }

    function renderOrderCard(group) {
      const isGroup = group.length > 1;
      const first = group[0];
      const cust = first.customers || {};
      const addr = first.addresses || {};
      const allSameStatus = group.every(o => o.status === first.status);
      const dateLabel = first.delivery_date ? new Date(first.delivery_date + 'T00:00:00').toLocaleDateString('ca-ES', { day: '2-digit', month: '2-digit' }) : '';
      const timeLabel = first.slot_time || '';
      const grandTotal = group.reduce((s, o) => s + (Number(o.total) || 0), 0);
      const stage = stageOfGroup(group);
      const headerBand = !allSameStatus ? 'bg-[#6B7280]' : (stage === 'pending' ? 'bg-[#F59E0B]' : 'bg-[#3B82F6]');

      const ordersHtml = group.map((o, idx) => {
        const items = o.order_items || [];
        const itemsHtml = items.map(it => `
          <div class="flex justify-between gap-2 text-sm">
            <span>${it.quantity}× ${it.product_name}${it.notes ? `<span class="block text-xs text-[#DC2626] font-semibold">⚠ ${escapeHtml(it.notes)}</span>` : ''}</span>
            <span class="shrink-0 text-[#6B7280]">${fmt(it.unit_price * it.quantity)}</span>
          </div>
        `).join('');
        return `
          <div class="space-y-2">
            ${isGroup ? `<p class="text-xs font-bold uppercase tracking-wide text-[#6B7280]">Comanda ${idx + 1}${!allSameStatus ? ' · ' + (STATUS_LABEL[o.status] || o.status) : ''}</p>` : ''}
            <div class="space-y-1.5">${itemsHtml}</div>
            <div class="flex items-center justify-between text-sm">
              <span class="text-[#6B7280]">${o.payment_method === 'cash' ? 'Efectiu al repartidor' : 'Pagat online'}${o.tip_amount > 0 ? ` · Propina ${fmt(o.tip_amount)}` : ''}</span>
              <span class="font-bold">${fmt(o.total)}</span>
            </div>
            ${o.notes ? `<p class="text-xs italic text-[#6B7280]">${escapeHtml(o.notes)}</p>` : ''}
            ${isGroup && !allSameStatus ? actionsRow([o.id], stageOf(o), 'sm') : ''}
          </div>
        `;
      }).join(isGroup ? '<div class="border-t border-dashed border-[#E5E7EB]"></div>' : '');

      const headerStatus = allSameStatus ? (STATUS_LABEL[first.status] || first.status) : 'Diverses comandes';

      return `
        <div class="bg-[#F7F8FA] text-[#14171C] rounded-2xl shadow-lg overflow-hidden">
          <div class="px-5 py-3 flex items-center justify-between ${headerBand} text-white">
            <span class="font-black text-sm uppercase tracking-wide">${headerStatus}${isGroup ? ` · ${group.length} comandes` : ''}</span>
            <span class="text-xs font-semibold opacity-90">${dateLabel} ${timeLabel}</span>
          </div>
          <div class="p-5 space-y-4">
            <div>
              <p class="font-bold text-lg">${escapeHtml(cust.name || 'Client')}</p>
              <a href="tel:${escapeHtml(cust.phone || '')}" class="text-sm text-[#2563EB] font-semibold">${escapeHtml(cust.phone || '')}</a>
            </div>
            <div class="text-sm text-[#4B5563] leading-relaxed">
              ${escapeHtml(addr.street || '')}${addr.floor ? ', ' + escapeHtml(addr.floor) : ''}<br>
              ${escapeHtml(addr.postal_code || '')} ${escapeHtml(addr.city || '')}
              ${addr.notes ? `<br><span class="italic">${escapeHtml(addr.notes)}</span>` : ''}
            </div>
            <div class="border-t border-[#E5E7EB] pt-3 space-y-3">
              ${ordersHtml}
            </div>
            ${isGroup ? `
              <div class="border-t border-[#E5E7EB] pt-3 flex items-center justify-between text-sm">
                <span class="text-[#4B5563] font-semibold">Total combinat</span>
                <span class="font-black text-lg">${fmt(grandTotal)}</span>
              </div>
            ` : ''}
            ${allSameStatus ? `<div class="border-t border-[#E5E7EB] pt-3">${actionsRow(group.map(o => o.id), stage, 'lg')}</div>` : ''}
          </div>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function advanceStatusBulk(ids, newStatus) {
      const { error } = await supabase.from('orders').update({ status: newStatus }).in('id', ids);
      if (error) { alert('Error actualitzant la comanda: ' + error.message); return; }
      await loadOrders();
    }
    window.advanceStatusBulk = advanceStatusBulk;

    // ── Historial: comandes ja entregades o cancel·lades, per consultar-les
    // si cal revisar algun problema — no apareixen al tauler actiu. Té el seu
    // propi rang de dates (Des de / Fins a), independent del filtre Avui/Setmana
    // del tauler, per poder buscar qualsevol període passat. ──
    function openHistory() {
      const fromEl = document.getElementById('history-from');
      const toEl   = document.getElementById('history-to');
      if (!fromEl.value) {
        const from = new Date(); from.setDate(from.getDate() - 7);
        fromEl.value = from.toISOString().split('T')[0];
      }
      if (!toEl.value) toEl.value = todayISO();
      document.getElementById('history-modal').classList.remove('hidden');
      renderHistoryList();
    }
    window.openHistory = openHistory;

    function renderHistoryList() {
      const from = document.getElementById('history-from').value;
      const to   = document.getElementById('history-to').value;
      const hist = ordersCache
        .filter(o => (o.status === 'delivered' || o.status === 'cancelled')
          && o.delivery_date
          && (!from || o.delivery_date >= from)
          && (!to || o.delivery_date <= to))
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      const list = document.getElementById('history-list');
      if (!hist.length) {
        list.innerHTML = '<p class="text-center text-[#6B7280] py-10">Sense comandes completades en aquest període.</p>';
        return;
      }

      // Agrupa per dia d'entrega, amb capçalera de data — més fàcil de
      // repassar que una llista plana barrejant dies diferents.
      const byDay = new Map();
      hist.forEach(o => {
        const day = o.delivery_date || 'sense-data';
        if (!byDay.has(day)) byDay.set(day, []);
        byDay.get(day).push(o);
      });

      list.innerHTML = Array.from(byDay.entries()).map(([day, orders]) => `
        <div>
          <h3 class="text-xs font-bold uppercase tracking-widest text-[#6B7280] mb-2">${formatDayLabel(day)} · ${orders.length} comanda${orders.length > 1 ? 's' : ''}</h3>
          <div class="space-y-2">${orders.map(renderHistoryRow).join('')}</div>
        </div>
      `).join('<div class="border-t border-[#E5E7EB] my-4"></div>');
    }
    window.renderHistoryList = renderHistoryList;

    function closeHistory() {
      document.getElementById('history-modal').classList.add('hidden');
    }
    window.closeHistory = closeHistory;

    function formatDayLabel(day) {
      if (day === 'sense-data') return 'Sense data';
      const label = new Date(day + 'T00:00:00').toLocaleDateString('ca-ES', { weekday: 'long', day: '2-digit', month: 'long' });
      return label.charAt(0).toUpperCase() + label.slice(1);
    }

    function renderHistoryRow(o) {
      const cust = o.customers || {};
      const addr = o.addresses || {};
      const items = o.order_items || [];
      const itemsText = items.map(it => `${it.quantity}× ${it.product_name}`).join(', ');
      const time = new Date(o.created_at).toLocaleTimeString('ca-ES', { hour: '2-digit', minute: '2-digit' });
      const statusColor = o.status === 'cancelled' ? 'text-[#DC2626]' : 'text-[#16A34A]';
      const addressText = [addr.street, addr.floor].filter(Boolean).join(', ');
      return `
        <div class="border border-[#E5E7EB] rounded-xl px-4 py-3">
          <div class="flex items-center justify-between gap-2 mb-1">
            <span class="font-bold">${escapeHtml(cust.name || 'Client')}</span>
            <span class="text-xs font-bold uppercase ${statusColor}">${STATUS_LABEL[o.status] || o.status}</span>
          </div>
          <p class="text-xs text-[#6B7280] mb-1">${escapeHtml(o.slot_time || '')} · entrat a les ${time} · ${fmt(o.total)}</p>
          ${addressText ? `<p class="text-sm text-[#4B5563]">${escapeHtml(addressText)}${addr.postal_code ? ' · ' + escapeHtml(addr.postal_code) : ''}${addr.city ? ' ' + escapeHtml(addr.city) : ''}</p>` : ''}
          ${itemsText ? `<p class="text-sm text-[#374151] mt-1">${escapeHtml(itemsText)}</p>` : ''}
        </div>`;
    }

    // Resume session if already logged in (e.g. page refresh on the kitchen tablet)
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) await checkAccessAndStart();
    })();
  </script>
</body>
</html>
