<!DOCTYPE html>
<html lang="ca" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuina · micsas.ff</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="cocina.webmanifest">
  <link rel="apple-touch-icon" href="logo micsas.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cuina">
  <meta name="theme-color" content="#c80a07">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#2A1A0F] text-[#F2E6CE] font-['League_Spartan',sans-serif] antialiased min-h-screen">

  <!-- ════ LOGIN SCREEN ════ -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-[#F2E6CE] text-[#2A1A0F] rounded-3xl shadow-2xl p-8 space-y-5">
      <div class="text-center">
        <h1 class="font-black tracking-tight text-3xl">Cuina</h1>
        <p class="text-sm font-light text-[#5A3E28] mt-1">micsas.ff · panell intern</p>
      </div>
      <div class="space-y-3">
        <input id="login-email" type="email" placeholder="Email" autocomplete="username"
          class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
        <input id="login-password" type="password" placeholder="Contrasenya" autocomplete="current-password"
          class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
      </div>
      <p id="login-error" class="hidden text-xs text-[#E23F2E] text-center"></p>
      <button id="login-btn" onclick="doLogin()"
        class="w-full py-3.5 rounded-full font-medium text-[15px] text-[#F2E6CE] bg-[#E23F2E] hover:bg-[#B82A1F] transition-all shadow-sm">
        Entrar
      </button>
    </div>
  </div>

  <!-- ════ KITCHEN SCREEN ════ -->
  <div id="kitchen-screen" class="hidden min-h-screen">
    <header class="sticky top-0 z-20 flex items-center justify-between px-6 py-4 bg-[#2A1A0F] border-b border-[#F2E6CE]/15">
      <div class="flex items-center gap-3">
        <h1 class="font-black tracking-tight text-2xl">Comandes</h1>
        <span id="order-count" class="px-2.5 py-1 rounded-full bg-[#E23F2E] text-xs font-bold"></span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 pr-3 border-r border-[#F2E6CE]/15">
          <button onclick="setDateScope('today')" id="scope-today" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 transition-all">Avui (pase)</button>
          <button onclick="setDateScope('week')" id="scope-week" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 transition-all">Setmana</button>
        </div>
        <button onclick="setFilter('active')" id="filter-active" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 transition-all">Actives</button>
        <button onclick="setFilter('all')" id="filter-all" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 transition-all">Totes</button>
        <button onclick="doLogout()" class="px-4 py-2 rounded-full text-sm font-medium text-[#F2E6CE]/60 hover:text-[#F2E6CE] transition-colors">
          Sortir
        </button>
      </div>
    </header>

    <main id="orders-grid" class="p-6 grid gap-5 grid-cols-1 md:grid-cols-2 xl:grid-cols-3"></main>
    <p id="orders-empty" class="hidden text-center text-[#F2E6CE]/50 py-24 text-lg">No hi ha comandes ara mateix.</p>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    window.supabase = supabase; // permite depurar consultas desde la consola

    const STATUS_FLOW = ['pending', 'preparing', 'ready', 'delivered'];
    const STATUS_LABEL = { pending: 'Pendent', preparing: 'En preparació', ready: 'Llest', delivered: 'Entregat', cancelled: 'Cancel·lat' };
    const STATUS_NEXT  = { pending: 'preparing', preparing: 'ready', ready: 'delivered' };
    const STATUS_NEXT_LABEL = { pending: 'Començar a preparar', preparing: 'Marcar com llest', ready: 'Marcar com entregat' };

    let currentFilter = 'active';
    let currentDateScope = 'today';
    let ordersCache = [];

    function fmt(n) { return (Number(n) || 0).toFixed(2).replace('.', ',') + ' €'; }
    function todayISO() { return new Date().toISOString().split('T')[0]; }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Entrant...';
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Entrar';
      if (error) {
        errEl.textContent = 'Email o contrasenya incorrectes.';
        errEl.classList.remove('hidden');
        return;
      }
      await checkAccessAndStart();
    }
    window.doLogin = doLogin;

    async function doLogout() {
      await supabase.auth.signOut();
      location.reload();
    }
    window.doLogout = doLogout;

    function setFilter(f) {
      currentFilter = f;
      document.getElementById('filter-active').classList.toggle('bg-[#F2E6CE]', f === 'active');
      document.getElementById('filter-active').classList.toggle('text-[#2A1A0F]', f === 'active');
      document.getElementById('filter-all').classList.toggle('bg-[#F2E6CE]', f === 'all');
      document.getElementById('filter-all').classList.toggle('text-[#2A1A0F]', f === 'all');
      renderOrders();
    }
    window.setFilter = setFilter;

    function setDateScope(s) {
      currentDateScope = s;
      document.getElementById('scope-today').classList.toggle('bg-[#F2E6CE]', s === 'today');
      document.getElementById('scope-today').classList.toggle('text-[#2A1A0F]', s === 'today');
      document.getElementById('scope-week').classList.toggle('bg-[#F2E6CE]', s === 'week');
      document.getElementById('scope-week').classList.toggle('text-[#2A1A0F]', s === 'week');
      renderOrders();
    }
    window.setDateScope = setDateScope;

    async function checkAccessAndStart() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;
      // RLS already restricts orders to staff-only, but probe once to give a clear message
      const { data, error } = await supabase.from('orders').select('id').limit(1);
      if (error) {
        document.getElementById('login-error').textContent = 'Error consultant comandes: ' + error.message;
        document.getElementById('login-error').classList.remove('hidden');
        return;
      }
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('kitchen-screen').classList.remove('hidden');
      setFilter('active');
      setDateScope('today');
      await loadOrders();
      subscribeRealtime();
    }

    async function loadOrders() {
      const { data, error } = await supabase
        .from('orders')
        .select('*, customers(name, phone, email), addresses(street, floor, postal_code, city, notes), order_items(*)')
        .order('created_at', { ascending: true });
      if (error) { console.error(error); return; }
      ordersCache = data || [];
      renderOrders();
    }

    function subscribeRealtime() {
      supabase
        .channel('cocina-orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadOrders())
        .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' }, () => loadOrders())
        .subscribe();
    }

    function renderOrders() {
      const today = todayISO();
      const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() + 6);
      const weekEndStr = weekEnd.toISOString().split('T')[0];
      const visible = ordersCache.filter(o => {
        if (currentDateScope === 'today') {
          if (o.delivery_date !== today) return false;
        } else if (currentDateScope === 'week') {
          if (!o.delivery_date || o.delivery_date < today || o.delivery_date > weekEndStr) return false;
        }
        if (currentFilter === 'all') return true;
        return o.status !== 'delivered' && o.status !== 'cancelled';
      });
      document.getElementById('order-count').textContent = visible.length;
      const grid = document.getElementById('orders-grid');
      const empty = document.getElementById('orders-empty');
      if (visible.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = visible.map(renderOrderCard).join('');
    }

    function renderOrderCard(o) {
      const cust = o.customers || {};
      const addr = o.addresses || {};
      const items = o.order_items || [];
      const next = STATUS_NEXT[o.status];
      const isCancelled = o.status === 'cancelled';
      const isDone = o.status === 'delivered';
      const borderColor = isCancelled ? 'border-[#9B8A72]/40' : (isDone ? 'border-[#5FA86A]/40' : 'border-[#E23F2E]/40');

      const itemsHtml = items.map(it => `
        <div class="flex justify-between gap-2 text-sm">
          <span>${it.quantity}× ${it.product_name}${it.notes ? `<span class="block text-xs text-[#E23F2E] font-medium">⚠ ${escapeHtml(it.notes)}</span>` : ''}</span>
          <span class="shrink-0 text-[#5A3E28]">${fmt(it.unit_price * it.quantity)}</span>
        </div>
      `).join('');

      const dateLabel = o.delivery_date ? new Date(o.delivery_date + 'T00:00:00').toLocaleDateString('ca-ES', { day: '2-digit', month: '2-digit' }) : '';
      const timeLabel = o.slot_time || '';

      return `
        <div class="bg-[#F2E6CE] text-[#2A1A0F] rounded-2xl border-2 ${borderColor} shadow-lg overflow-hidden">
          <div class="px-5 py-3 flex items-center justify-between bg-[#2A1A0F]/5 border-b border-[#C4B08A]/30">
            <span class="font-black text-sm uppercase tracking-wide">${STATUS_LABEL[o.status] || o.status}</span>
            <span class="text-xs font-medium text-[#5A3E28]">${dateLabel} ${timeLabel}</span>
          </div>
          <div class="p-5 space-y-4">
            <div>
              <p class="font-bold text-lg">${escapeHtml(cust.name || 'Client')}</p>
              <a href="tel:${escapeHtml(cust.phone || '')}" class="text-sm text-[#E23F2E] font-medium">${escapeHtml(cust.phone || '')}</a>
            </div>
            <div class="text-sm text-[#5A3E28] leading-relaxed">
              ${escapeHtml(addr.street || '')}${addr.floor ? ', ' + escapeHtml(addr.floor) : ''}<br>
              ${escapeHtml(addr.postal_code || '')} ${escapeHtml(addr.city || '')}
              ${addr.notes ? `<br><span class="italic">${escapeHtml(addr.notes)}</span>` : ''}
            </div>
            <div class="border-t border-[#C4B08A]/30 pt-3 space-y-1.5">
              ${itemsHtml}
            </div>
            <div class="border-t border-[#C4B08A]/30 pt-3 flex items-center justify-between text-sm">
              <span class="text-[#5A3E28]">${o.payment_method === 'cash' ? 'Efectiu al repartidor' : 'Pagat online'} ${o.tip_amount > 0 ? `· Propina ${fmt(o.tip_amount)}` : ''}</span>
              <span class="font-black text-lg">${fmt(o.total)}</span>
            </div>
            ${o.notes ? `<p class="text-xs italic text-[#5A3E28] border-t border-[#C4B08A]/30 pt-3">${escapeHtml(o.notes)}</p>` : ''}
            ${!isCancelled && !isDone ? `
              <div class="flex gap-2 pt-2">
                ${next ? `<button onclick="advanceStatus('${o.id}','${next}')" class="flex-1 py-3 rounded-full bg-[#E23F2E] text-[#F2E6CE] font-medium text-sm hover:bg-[#B82A1F] transition-all">${STATUS_NEXT_LABEL[o.status]}</button>` : ''}
                <button onclick="advanceStatus('${o.id}','cancelled')" class="px-4 py-3 rounded-full border border-[#C4B08A]/40 text-[#9B8A72] text-sm hover:border-[#E23F2E]/40 hover:text-[#E23F2E] transition-all">✕</button>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function advanceStatus(orderId, newStatus) {
      const { error } = await supabase.from('orders').update({ status: newStatus }).eq('id', orderId);
      if (error) { alert('Error actualitzant la comanda: ' + error.message); return; }
      await loadOrders();
    }
    window.advanceStatus = advanceStatus;

    // Resume session if already logged in (e.g. page refresh on the kitchen tablet)
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) await checkAccessAndStart();
    })();
  </script>
</body>
</html>
