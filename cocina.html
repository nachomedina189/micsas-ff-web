<!DOCTYPE html>
<html lang="ca" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuina · micsas.ff</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="cocina.webmanifest">
  <link rel="apple-touch-icon" href="logo micsas.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cuina">
  <meta name="theme-color" content="#c80a07">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#2A1A0F] text-[#F2E6CE] font-['League_Spartan',sans-serif] antialiased min-h-screen">

  <!-- ════ LOGIN SCREEN ════ -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-[#F2E6CE] text-[#2A1A0F] rounded-3xl shadow-2xl p-8 space-y-5">
      <div class="text-center">
        <h1 class="font-black tracking-tight text-3xl">Cuina</h1>
        <p class="text-sm font-light text-[#5A3E28] mt-1">micsas.ff · panell intern</p>
      </div>
      <div class="space-y-3">
        <input id="login-email" type="email" placeholder="Email" autocomplete="username"
          class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
        <input id="login-password" type="password" placeholder="Contrasenya" autocomplete="current-password"
          class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
      </div>
      <p id="login-error" class="hidden text-xs text-[#E23F2E] text-center"></p>
      <button id="login-btn" onclick="doLogin()"
        class="w-full py-3.5 rounded-full font-medium text-[15px] text-[#F2E6CE] bg-[#E23F2E] hover:bg-[#B82A1F] transition-all shadow-sm">
        Entrar
      </button>
    </div>
  </div>

  <!-- ════ KITCHEN SCREEN ════ -->
  <div id="kitchen-screen" class="hidden min-h-screen">
    <header class="sticky top-0 z-20 flex items-center justify-between px-6 py-4 bg-[#2A1A0F] border-b border-[#F2E6CE]/15">
      <div class="flex items-center gap-3">
        <h1 class="font-black tracking-tight text-2xl">Comandes</h1>
        <span id="order-count" class="px-2.5 py-1 rounded-full bg-[#E23F2E] text-xs font-bold"></span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 pr-3 border-r border-[#F2E6CE]/15">
          <button onclick="setDateScope('today')" id="scope-today" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 transition-all">Avui (pase)</button>
          <button onclick="setDateScope('week')" id="scope-week" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 transition-all">Setmana</button>
        </div>
        <button onclick="openHistory()" class="px-4 py-2 rounded-full text-sm font-medium border border-[#F2E6CE]/30 hover:bg-[#F2E6CE]/10 transition-all">Historial</button>
        <button onclick="doLogout()" class="px-4 py-2 rounded-full text-sm font-medium text-[#F2E6CE]/60 hover:text-[#F2E6CE] transition-colors">
          Sortir
        </button>
      </div>
    </header>

    <!-- ════ TABLER (KANBAN): Sense afegir → Preparant ════ -->
    <main class="p-6 grid gap-6 grid-cols-1 md:grid-cols-2 items-start">
      <section class="bg-[#1F130A] rounded-2xl p-4 md:p-5 border border-[#F2E6CE]/10">
        <h2 class="flex items-center gap-2 font-black text-lg uppercase tracking-wide mb-4">
          <span class="w-2.5 h-2.5 rounded-full bg-[#F59E0B]"></span> Sense afegir
          <span id="count-pending" class="ml-auto px-2.5 py-0.5 rounded-full bg-[#F2E6CE]/10 text-sm font-bold">0</span>
        </h2>
        <div id="col-pending" class="space-y-4"></div>
      </section>
      <section class="bg-[#1F130A] rounded-2xl p-4 md:p-5 border border-[#F2E6CE]/10">
        <h2 class="flex items-center gap-2 font-black text-lg uppercase tracking-wide mb-4">
          <span class="w-2.5 h-2.5 rounded-full bg-[#E23F2E]"></span> Preparant
          <span id="count-preparing" class="ml-auto px-2.5 py-0.5 rounded-full bg-[#F2E6CE]/10 text-sm font-bold">0</span>
        </h2>
        <div id="col-preparing" class="space-y-4"></div>
      </section>
    </main>
    <p id="orders-empty" class="hidden text-center text-[#F2E6CE]/50 py-24 text-lg">No hi ha comandes ara mateix.</p>
  </div>

  <!-- ════ HISTORIAL (modal) ════ -->
  <div id="history-modal" class="hidden fixed inset-0 z-[900] bg-black/50 flex items-end md:items-center justify-center">
    <div class="bg-[#F2E6CE] text-[#2A1A0F] w-full md:max-w-2xl md:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between px-6 py-4 border-b border-[#C4B08A]/30 shrink-0">
        <h2 class="font-black tracking-tight text-2xl">Historial</h2>
        <button onclick="closeHistory()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#C4B08A]/20 text-[#5A3E28] hover:text-[#2A1A0F] transition-colors">✕</button>
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto p-6 space-y-3"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    window.supabase = supabase; // permite depurar consultas desde la consola

    // Tauler de 2 etapes actives (com un monitor de cuina tipus McDonald's):
    // "pending" = encara no introduït a Aronium; "preparing"/"ready" = ja
    // introduït i en marxa. En marcar "Llest" la comanda passa directament a
    // "delivered" i desapareix del tauler — només queda consultable a l'Historial.
    const STATUS_LABEL = { pending: 'Sense afegir', preparing: 'Preparant', ready: 'Preparant', delivered: 'Entregat', cancelled: 'Cancel·lat' };

    let currentDateScope = 'today';
    let ordersCache = [];

    function fmt(n) { return (Number(n) || 0).toFixed(2).replace('.', ',') + ' €'; }
    function todayISO() { return new Date().toISOString().split('T')[0]; }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Entrant...';
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Entrar';
      if (error) {
        errEl.textContent = 'Email o contrasenya incorrectes.';
        errEl.classList.remove('hidden');
        return;
      }
      await checkAccessAndStart();
    }
    window.doLogin = doLogin;

    async function doLogout() {
      await supabase.auth.signOut();
      location.reload();
    }
    window.doLogout = doLogout;

    function setDateScope(s) {
      currentDateScope = s;
      document.getElementById('scope-today').classList.toggle('bg-[#F2E6CE]', s === 'today');
      document.getElementById('scope-today').classList.toggle('text-[#2A1A0F]', s === 'today');
      document.getElementById('scope-week').classList.toggle('bg-[#F2E6CE]', s === 'week');
      document.getElementById('scope-week').classList.toggle('text-[#2A1A0F]', s === 'week');
      renderOrders();
    }
    window.setDateScope = setDateScope;

    async function checkAccessAndStart() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;
      // RLS already restricts orders to staff-only, but probe once to give a clear message
      const { data, error } = await supabase.from('orders').select('id').limit(1);
      if (error) {
        document.getElementById('login-error').textContent = 'Error consultant comandes: ' + error.message;
        document.getElementById('login-error').classList.remove('hidden');
        return;
      }
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('kitchen-screen').classList.remove('hidden');
      setDateScope('today');
      await loadOrders();
      subscribeRealtime();
    }

    async function loadOrders() {
      const { data, error } = await supabase
        .from('orders')
        .select('*, customers(name, phone, email), addresses(street, floor, postal_code, city, notes), order_items(*)')
        .order('created_at', { ascending: true });
      if (error) { console.error(error); return; }
      ordersCache = data || [];
      renderOrders();
    }

    function subscribeRealtime() {
      supabase
        .channel('cocina-orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadOrders())
        .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' }, () => loadOrders())
        .subscribe();
    }

    function inDateScope(o) {
      const today = todayISO();
      if (currentDateScope === 'today') return o.delivery_date === today;
      if (currentDateScope === 'week') {
        const d = new Date(); d.setDate(d.getDate() + 6);
        const weekEndStr = d.toISOString().split('T')[0];
        return !!o.delivery_date && o.delivery_date >= today && o.delivery_date <= weekEndStr;
      }
      return true;
    }

    function renderOrders() {
      const board = ordersCache.filter(o => inDateScope(o) && o.status !== 'delivered' && o.status !== 'cancelled');
      const groups = groupOrders(board);
      const pendingGroups   = groups.filter(g => stageOfGroup(g) === 'pending');
      const preparingGroups = groups.filter(g => stageOfGroup(g) === 'preparing');

      document.getElementById('order-count').textContent = groups.length;
      document.getElementById('count-pending').textContent = pendingGroups.length;
      document.getElementById('count-preparing').textContent = preparingGroups.length;

      const empty = document.getElementById('orders-empty');
      empty.classList.toggle('hidden', groups.length > 0);

      const noneMsg = '<p class="text-sm text-[#F2E6CE]/40 text-center py-10">Cap comanda</p>';
      document.getElementById('col-pending').innerHTML   = pendingGroups.length   ? pendingGroups.map(renderOrderCard).join('')   : noneMsg;
      document.getElementById('col-preparing').innerHTML = preparingGroups.length ? preparingGroups.map(renderOrderCard).join('') : noneMsg;
    }

    // Agrupa pedidos del mateix client (per telèfon) per a la mateixa
    // delivery_date + slot_time — perquè el pizzero vegi d'un cop tot el que
    // s'ha de preparar/portar juntament, encara que siguin comandes (i pagaments)
    // separats a l'hora d'introduir-los a Aronium.
    function groupOrders(list) {
      const map = new Map();
      list.forEach(o => {
        const phone = (o.customers && o.customers.phone) || ('sense-tel-' + o.id);
        const key = phone + '__' + o.delivery_date + '__' + o.slot_time;
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(o);
      });
      return Array.from(map.values());
    }

    // Etapa visual d'una comanda individual: pending = encara no afegida a
    // Aronium; qualsevol altra (preparing/ready) = ja en marxa.
    function stageOf(o) { return o.status === 'pending' ? 'pending' : 'preparing'; }
    // Etapa d'un grup: si encara queda alguna comanda sense afegir, el grup
    // sencer es mostra a la columna "Sense afegir" (amb botons individuals).
    function stageOfGroup(group) { return group.some(o => o.status === 'pending') ? 'pending' : 'preparing'; }

    function actionsRow(ids, stage, size) {
      const pad = size === 'sm' ? 'py-2 text-xs' : 'py-3 text-sm';
      const idsJs = ids.join("','");
      const nextStatus = stage === 'pending' ? 'preparing' : 'delivered';
      const nextLabel  = stage === 'pending' ? 'Afegit a Aronium' : 'Llest';
      const nextColor  = stage === 'pending' ? 'bg-[#E23F2E] hover:bg-[#B82A1F]' : 'bg-[#5FA86A] hover:bg-[#4c8a56]';
      return `
        <div class="flex gap-2">
          <button onclick="advanceStatusBulk(['${idsJs}'],'${nextStatus}')" class="flex-1 ${pad} rounded-full ${nextColor} text-[#F2E6CE] font-medium transition-all">${nextLabel}</button>
          <button onclick="advanceStatusBulk(['${idsJs}'],'cancelled')" class="px-4 ${pad} rounded-full border border-[#C4B08A]/40 text-[#9B8A72] hover:border-[#E23F2E]/40 hover:text-[#E23F2E] transition-all">✕</button>
        </div>`;
    }

    function renderOrderCard(group) {
      const isGroup = group.length > 1;
      const first = group[0];
      const cust = first.customers || {};
      const addr = first.addresses || {};
      const allSameStatus = group.every(o => o.status === first.status);
      const dateLabel = first.delivery_date ? new Date(first.delivery_date + 'T00:00:00').toLocaleDateString('ca-ES', { day: '2-digit', month: '2-digit' }) : '';
      const timeLabel = first.slot_time || '';
      const grandTotal = group.reduce((s, o) => s + (Number(o.total) || 0), 0);

      const ordersHtml = group.map((o, idx) => {
        const items = o.order_items || [];
        const itemsHtml = items.map(it => `
          <div class="flex justify-between gap-2 text-sm">
            <span>${it.quantity}× ${it.product_name}${it.notes ? `<span class="block text-xs text-[#E23F2E] font-medium">⚠ ${escapeHtml(it.notes)}</span>` : ''}</span>
            <span class="shrink-0 text-[#5A3E28]">${fmt(it.unit_price * it.quantity)}</span>
          </div>
        `).join('');
        return `
          <div class="space-y-2">
            ${isGroup ? `<p class="text-xs font-bold uppercase tracking-wide text-[#9B8A72]">Comanda ${idx + 1}${!allSameStatus ? ' · ' + (STATUS_LABEL[o.status] || o.status) : ''}</p>` : ''}
            <div class="space-y-1.5">${itemsHtml}</div>
            <div class="flex items-center justify-between text-sm">
              <span class="text-[#5A3E28]">${o.payment_method === 'cash' ? 'Efectiu al repartidor' : 'Pagat online'}${o.tip_amount > 0 ? ` · Propina ${fmt(o.tip_amount)}` : ''}</span>
              <span class="font-bold">${fmt(o.total)}</span>
            </div>
            ${o.notes ? `<p class="text-xs italic text-[#5A3E28]">${escapeHtml(o.notes)}</p>` : ''}
            ${isGroup && !allSameStatus ? actionsRow([o.id], stageOf(o), 'sm') : ''}
          </div>
        `;
      }).join(isGroup ? '<div class="border-t border-dashed border-[#C4B08A]/30"></div>' : '');

      const headerStatus = allSameStatus ? (STATUS_LABEL[first.status] || first.status) : 'Diverses comandes';

      return `
        <div class="bg-[#F2E6CE] text-[#2A1A0F] rounded-2xl border-2 border-[#E23F2E]/40 shadow-lg overflow-hidden">
          <div class="px-5 py-3 flex items-center justify-between bg-[#2A1A0F]/5 border-b border-[#C4B08A]/30">
            <span class="font-black text-sm uppercase tracking-wide">${headerStatus}${isGroup ? ` · ${group.length} comandes` : ''}</span>
            <span class="text-xs font-medium text-[#5A3E28]">${dateLabel} ${timeLabel}</span>
          </div>
          <div class="p-5 space-y-4">
            <div>
              <p class="font-bold text-lg">${escapeHtml(cust.name || 'Client')}</p>
              <a href="tel:${escapeHtml(cust.phone || '')}" class="text-sm text-[#E23F2E] font-medium">${escapeHtml(cust.phone || '')}</a>
            </div>
            <div class="text-sm text-[#5A3E28] leading-relaxed">
              ${escapeHtml(addr.street || '')}${addr.floor ? ', ' + escapeHtml(addr.floor) : ''}<br>
              ${escapeHtml(addr.postal_code || '')} ${escapeHtml(addr.city || '')}
              ${addr.notes ? `<br><span class="italic">${escapeHtml(addr.notes)}</span>` : ''}
            </div>
            <div class="border-t border-[#C4B08A]/30 pt-3 space-y-3">
              ${ordersHtml}
            </div>
            ${isGroup ? `
              <div class="border-t border-[#C4B08A]/30 pt-3 flex items-center justify-between text-sm">
                <span class="text-[#5A3E28] font-medium">Total combinat</span>
                <span class="font-black text-lg">${fmt(grandTotal)}</span>
              </div>
            ` : ''}
            ${allSameStatus ? `<div class="border-t border-[#C4B08A]/30 pt-3">${actionsRow(group.map(o => o.id), stageOfGroup(group), 'lg')}</div>` : ''}
          </div>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function advanceStatusBulk(ids, newStatus) {
      const { error } = await supabase.from('orders').update({ status: newStatus }).in('id', ids);
      if (error) { alert('Error actualitzant la comanda: ' + error.message); return; }
      await loadOrders();
    }
    window.advanceStatusBulk = advanceStatusBulk;

    // ── Historial: comandes ja entregades o cancel·lades, per consultar-les
    // si cal revisar algun problema — no apareixen al tauler actiu. ──
    function openHistory() {
      const hist = ordersCache
        .filter(o => inDateScope(o) && (o.status === 'delivered' || o.status === 'cancelled'))
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const list = document.getElementById('history-list');
      list.innerHTML = hist.length
        ? hist.map(renderHistoryRow).join('')
        : '<p class="text-center text-[#9B8A72] py-10">Sense comandes completades en aquest període.</p>';
      document.getElementById('history-modal').classList.remove('hidden');
    }
    window.openHistory = openHistory;

    function closeHistory() {
      document.getElementById('history-modal').classList.add('hidden');
    }
    window.closeHistory = closeHistory;

    function renderHistoryRow(o) {
      const cust = o.customers || {};
      const items = o.order_items || [];
      const itemsText = items.map(it => `${it.quantity}× ${it.product_name}`).join(', ');
      const time = new Date(o.created_at).toLocaleString('ca-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      const statusColor = o.status === 'cancelled' ? 'text-[#E23F2E]' : 'text-[#5FA86A]';
      return `
        <div class="border border-[#C4B08A]/30 rounded-xl px-4 py-3">
          <div class="flex items-center justify-between gap-2 mb-1">
            <span class="font-bold">${escapeHtml(cust.name || 'Client')}</span>
            <span class="text-xs font-bold uppercase ${statusColor}">${STATUS_LABEL[o.status] || o.status}</span>
          </div>
          <p class="text-xs text-[#9B8A72] mb-1">${time} · ${escapeHtml(o.slot_time || '')} · ${fmt(o.total)}</p>
          ${itemsText ? `<p class="text-sm text-[#5A3E28]">${escapeHtml(itemsText)}</p>` : ''}
        </div>`;
    }

    // Resume session if already logged in (e.g. page refresh on the kitchen tablet)
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) await checkAccessAndStart();
    })();
  </script>
</body>
</html>
