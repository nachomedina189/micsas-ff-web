<!DOCTYPE html>
<html lang="ca" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El meu compte · micsas.ff</title>
  <meta name="description" content="Gestiona les teves dades i comandes a micsas.ff.">
  <meta name="robots" content="noindex">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="transicion.css">
  <link rel="dns-prefetch" href="https://hoirqrkdgbmvpwutwuwj.supabase.co">
</head>

<body class="bg-[#F2E6CE] text-[#2A1A0F] font-['League_Spartan',sans-serif] antialiased overflow-x-hidden selection:bg-[#E23F2E]/20 min-h-screen">

  <!-- Paper texture -->
  <div class="fixed inset-0 w-full h-full pointer-events-none z-[9998] opacity-[0.03]"
    style="background-image:url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E&quot;)">
  </div>

  <!-- NAV -->
  <nav class="sticky top-0 z-40 px-6 py-4 md:px-12 flex justify-between items-center bg-[#F2E6CE]/95 backdrop-blur-md border-b border-[#C4B08A]/30 shadow-sm">
    <a href="carta.html" class="font-['League_Spartan',sans-serif] font-black tracking-tighter text-2xl text-[#2A1A0F] hover:text-[#E23F2E] transition-colors">
      micsas.ff
    </a>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-[#C4B08A]/60 text-sm">
        <button data-lang="ca" onclick="applyLang('ca')" style="font-weight:700;color:#E23F2E">CA</button>
        <span class="text-[#C4B08A]/60 select-none">|</span>
        <button data-lang="es" onclick="applyLang('es')" style="font-weight:500;color:#2A1E16">ES</button>
      </div>
      <a href="pedido.html" class="flex items-center gap-1.5 text-sm font-medium text-[#5A3E28] hover:text-[#E23F2E] transition-colors font-['League_Spartan',sans-serif]">
        <iconify-icon icon="solar:arrow-left-linear" width="16" style="stroke-width:1.5;"></iconify-icon>
        Tornar a la carta
      </a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="max-w-2xl mx-auto px-4 py-10 pb-24 space-y-8">

    <!-- Page title -->
    <div class="border-b border-[#C4B08A]/30 pb-6">
      <h1 class="font-['League_Spartan',sans-serif] font-black tracking-tight text-4xl text-[#2A1A0F]">El meu compte</h1>
      <p id="account-subtitle" class="text-sm font-light text-[#5A3E28] mt-1"></p>
    </div>

    <!-- Not-logged-in state -->
    <div id="no-auth-state" class="hidden text-center py-16">
      <div class="w-20 h-20 rounded-full bg-[#E6D5B0]/40 flex items-center justify-center mx-auto mb-6">
        <iconify-icon icon="solar:user-circle-linear" width="40" style="color:#C4B08A;"></iconify-icon>
      </div>
      <h2 class="font-['League_Spartan',sans-serif] font-black tracking-tight text-2xl text-[#2A1A0F] mb-2">Has d'iniciar sessió</h2>
      <p class="text-sm font-light text-[#5A3E28] mb-8">Inicia sessió per veure les teves dades i comandes.</p>
      <a href="pedido.html"
        class="inline-block px-6 py-3 rounded-full font-['League_Spartan',sans-serif] font-medium text-[15px] text-[#F2E6CE] bg-[#E23F2E] hover:bg-[#B82A1F] transition-all shadow-sm">
        Anar a la comanda
      </a>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="flex justify-center py-16">
      <svg class="animate-spin w-8 h-8 text-[#C4B08A]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>

    <!-- Account content (hidden until loaded) -->
    <div id="account-content" class="hidden space-y-8">

      <!-- ── Les meves dades ── -->
      <section class="rounded-2xl border border-[#C4B08A]/30 bg-[#F7EDD8]/50 overflow-hidden">
        <div class="px-6 py-4 border-b border-[#C4B08A]/20">
          <h2 class="font-['League_Spartan',sans-serif] font-black tracking-tight text-xl text-[#2A1A0F]">Les meves dades</h2>
        </div>
        <div class="px-6 py-5 space-y-4">
          <div>
            <label for="ac-name" class="block text-xs font-medium mb-1.5 text-[#2A1A0F]">Nom</label>
            <input id="ac-name" type="text" autocomplete="given-name" placeholder="El teu nom"
              class="w-full bg-[#E6D5B0]/20 border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-[#2A1A0F] text-sm outline-none transition-all placeholder:text-[#9B8A72] focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
          </div>
          <div>
            <label for="ac-phone" class="block text-xs font-medium mb-1.5 text-[#2A1A0F]">Telèfon</label>
            <input id="ac-phone" type="tel" autocomplete="tel" placeholder="6XX XXX XXX"
              class="w-full bg-[#E6D5B0]/20 border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-[#2A1A0F] text-sm outline-none transition-all placeholder:text-[#9B8A72] focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
          </div>
          <div>
            <label for="ac-email" class="block text-xs font-medium mb-1.5 text-[#2A1A0F]">
              Email <span class="text-[#9B8A72] font-normal">(no modificable)</span>
            </label>
            <input id="ac-email" type="email" readonly
              class="w-full bg-[#E6D5B0]/10 border border-[#C4B08A]/20 rounded-xl px-4 py-3 text-[#9B8A72] text-sm outline-none cursor-not-allowed">
          </div>
          <p id="ac-err" class="hidden text-xs text-[#E23F2E]"></p>
          <button onclick="saveProfile()"
            class="w-full py-3 rounded-full font-['League_Spartan',sans-serif] font-medium text-[15px] text-[#F2E6CE] bg-[#E23F2E] hover:bg-[#B82A1F] transition-all shadow-sm">
            Desar canvis
          </button>
        </div>
      </section>

      <!-- ── Les meves comandes ── -->
      <section class="rounded-2xl border border-[#C4B08A]/30 bg-[#F7EDD8]/50 overflow-hidden">
        <div class="px-6 py-4 border-b border-[#C4B08A]/20">
          <h2 class="font-['League_Spartan',sans-serif] font-black tracking-tight text-xl text-[#2A1A0F]">Les meves comandes</h2>
        </div>
        <div id="orders-list" class="divide-y divide-[#C4B08A]/20">
          <!-- Rendered by JS -->
        </div>
        <div id="orders-empty" class="hidden px-6 py-10 text-center">
          <iconify-icon icon="solar:bag-heart-linear" width="36" style="color:#C4B08A;" class="mb-3 block mx-auto"></iconify-icon>
          <p class="text-sm font-light text-[#5A3E28]">Encara no has fet cap comanda.</p>
          <a href="pedido.html" class="inline-block mt-4 text-sm font-medium text-[#E23F2E] hover:underline font-['League_Spartan',sans-serif]">Fer la primera comanda →</a>
        </div>
      </section>

      <!-- ── Tancar sessió ── -->
      <section class="text-center pt-2 pb-4">
        <button onclick="signOutAndRedirect()"
          class="px-6 py-3 rounded-full font-['League_Spartan',sans-serif] font-medium text-[15px] text-[#5A3E28] border border-[#C4B08A]/40 hover:bg-[#E6D5B0]/30 transition-all">
          Tancar sessió
        </button>
      </section>

    </div>
  </main>

  <footer class="bg-[#F2E6CE] border-t border-[#C4B08A]/30 py-6 px-6">
    <div class="max-w-3xl mx-auto flex items-center justify-center gap-3 text-xs font-light text-[#5A3E28] flex-wrap">
      <a href="cookies.html" class="hover:text-[#E23F2E] transition-colors">Cookies</a>
      <span>·</span>
      <a href="privacidad.html" class="hover:text-[#E23F2E] transition-colors">Privacitat</a>
      <span>·</span>
      <a href="aviso-legal.html" class="hover:text-[#E23F2E] transition-colors">Avís legal</a>
      <span>·</span>
      <a href="terminos.html" class="hover:text-[#E23F2E] transition-colors">Termes i condicions</a>
    </div>
  </footer>

  <!-- Toast -->
  <div id="ac-toast" class="fixed bottom-6 inset-x-4 z-50 flex justify-center pointer-events-none hidden">
    <div id="ac-toast-inner" class="bg-[#2A1A0F] text-[#F2E6CE] text-sm font-light px-5 py-3.5 rounded-2xl shadow-xl max-w-sm text-center leading-relaxed"></div>
  </div>

  <script>
    // ── Compact MENU lookup for repeat-order matching ──
    const MENU_LOOKUP = [
      { id:'margherita-1889',      name:'Margherita 1889',      price:9   },
      { id:'marinara-olivata',     name:'Marinara Olivata',     price:8   },
      { id:'bianca-suprema',       name:'Bianca Suprema',       price:11  },
      { id:'sottobosco',           name:'Sottobosco',           price:11  },
      { id:'inferno-di-nduja',     name:"Inferno di 'Nduja",   price:13  },
      { id:'caramella-affumicata', name:'Caramella Affumicata', price:13  },
      { id:'antidiavola',          name:'Antidiavola',          price:13  },
      { id:'nutellina',            name:'Nutellina',            price:13  },
      { id:'d1', name:'Aigua mineral',    price:2   },
      { id:'d2', name:'Refresc',          price:2.5 },
      { id:'d3', name:'Cervesa artesana', price:4   },
      { id:'d4', name:'Tiramisú casolà',  price:5   },
    ];

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('ca-ES', { day:'2-digit', month:'2-digit', year:'numeric' })
        + ' ' + d.toLocaleTimeString('ca-ES', { hour:'2-digit', minute:'2-digit' });
    }
    function fmtPrice(n) { return '€' + Number(n).toFixed(2).replace('.', ','); }

    const STATUS_BADGE = {
      pending:    'bg-amber-100 text-amber-700',
      confirmed:  'bg-blue-100 text-blue-700',
      preparing:  'bg-blue-100 text-blue-700',
      on_the_way: 'bg-indigo-100 text-indigo-700',
      completed:  'bg-green-100 text-green-700',
      cancelled:  'bg-red-100 text-red-700',
    };
    const STATUS_LABEL = {
      pending:    'Pendent',
      confirmed:  'Confirmat',
      preparing:  'Preparant',
      on_the_way: 'En camí',
      completed:  'Entregat',
      cancelled:  'Cancel·lat',
    };

    let _toastTimer = null;
    function showToast(msg, isErr = false) {
      const el = document.getElementById('ac-toast');
      const inner = document.getElementById('ac-toast-inner');
      inner.textContent = msg;
      inner.className = isErr
        ? 'bg-[#E23F2E] text-[#F2E6CE] text-sm font-light px-5 py-3.5 rounded-2xl shadow-xl max-w-sm text-center leading-relaxed'
        : 'bg-[#2A1A0F] text-[#F2E6CE] text-sm font-light px-5 py-3.5 rounded-2xl shadow-xl max-w-sm text-center leading-relaxed';
      el.classList.remove('hidden');
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.add('hidden'), 3500);
    }

    function renderOrder(order, idx) {
      const status = order.status || 'pending';
      const badgeCls = STATUS_BADGE[status] || 'bg-gray-100 text-gray-600';
      const badgeLabel = STATUS_LABEL[status] || status;
      const itemCount = order.order_items ? order.order_items.length : 0;
      const itemsSummary = itemCount === 1 ? '1 producte' : itemCount + ' productes';

      const itemsHtml = (order.order_items || []).map(oi => `
        <div class="flex justify-between text-sm py-1 border-b border-[#C4B08A]/10 last:border-0">
          <div>
            <span class="text-[#2A1A0F] font-light">${oi.product_name.replace(/</g,'&lt;')}</span>
            <span class="text-[#9B8A72] ml-1">× ${oi.quantity}</span>
            ${oi.notes ? `<p class="text-xs text-[#9B8A72] mt-0.5">${oi.notes.replace(/</g,'&lt;')}</p>` : ''}
          </div>
          <span class="font-medium text-[#2A1A0F] shrink-0 ml-3">${fmtPrice(oi.unit_price * oi.quantity)}</span>
        </div>`).join('');

      const orderId = 'order-' + idx;
      const detailsId = 'details-' + idx;
      const itemsData = JSON.stringify(order.order_items || []).replace(/"/g, '&quot;');

      return `
        <div class="px-6 py-4">
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <div class="space-y-0.5">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-medium text-[#9B8A72] font-['League_Spartan',sans-serif]">#${order.id.slice(0,8)}</span>
                <span class="text-xs px-2 py-0.5 rounded-full font-medium ${badgeCls}">${badgeLabel}</span>
              </div>
              <p class="text-xs font-light text-[#9B8A72]">${fmtDate(order.created_at)}</p>
              <p class="text-sm font-light text-[#5A3E28]">${itemsSummary}</p>
            </div>
            <div class="text-right shrink-0">
              <p class="font-['League_Spartan',sans-serif] font-black tracking-tight text-xl text-[#E23F2E]">${fmtPrice(order.total)}</p>
            </div>
          </div>
          <div class="flex gap-2 mt-3 flex-wrap">
            <button onclick="toggleDetails('${detailsId}', this)"
              class="text-xs font-medium text-[#5A3E28] border border-[#C4B08A]/40 px-3 py-1.5 rounded-full hover:bg-[#E6D5B0]/30 transition-colors font-['League_Spartan',sans-serif]">
              Veure detalls
            </button>
            <button onclick='repeatOrder(${itemsData})'
              class="text-xs font-medium text-[#E23F2E] border border-[#E23F2E]/30 px-3 py-1.5 rounded-full hover:bg-[#E23F2E]/5 transition-colors font-['League_Spartan',sans-serif]">
              Repetir comanda
            </button>
          </div>
          <div id="${detailsId}" class="hidden mt-3 pt-3 border-t border-[#C4B08A]/20 space-y-1">
            ${itemsHtml}
          </div>
        </div>`;
    }

    function toggleDetails(id, btn) {
      const el = document.getElementById(id);
      if (!el) return;
      const isOpen = !el.classList.contains('hidden');
      el.classList.toggle('hidden', isOpen);
      btn.textContent = isOpen ? 'Veure detalls' : 'Amagar detalls';
    }

    function repeatOrder(orderItems) {
      if (!confirm('Vols afegir aquests productes al carret? El carret actual se sobreescriurà.')) return;
      const resolved = [];
      const missing = [];
      orderItems.forEach(oi => {
        const found = MENU_LOOKUP.find(m => m.name === oi.product_name);
        if (found) {
          resolved.push({ id: found.id, name: found.name, price: found.price, qty: oi.quantity, note: oi.notes || '' });
        } else {
          missing.push(oi.product_name);
        }
      });
      if (missing.length) {
        alert('Aquests productes ja no estan disponibles: ' + missing.join(', ') + '.');
      }
      if (resolved.length) {
        sessionStorage.setItem('micsas_repeat', JSON.stringify(resolved));
        window.location.href = 'pedido.html';
      } else {
        showToast('Cap producte disponible per repetir.', true);
      }
    }

    async function saveProfile() {
      const sb = window._sb;
      const user = window._user;
      if (!sb || !user) return;
      const name  = document.getElementById('ac-name').value.trim();
      const phone = document.getElementById('ac-phone').value.trim();
      const errEl = document.getElementById('ac-err');
      if (!name) { errEl.textContent = 'El nom és obligatori.'; errEl.classList.remove('hidden'); return; }
      errEl.classList.add('hidden');
      const { error } = await sb.from('customers')
        .update({ name, phone })
        .eq('auth_user_id', user.id);
      if (error) {
        showToast('Error en desar. Torna-ho a intentar.', true);
      } else {
        showToast('Dades actualitzades ✓');
      }
    }

    async function signOutAndRedirect() {
      const sb = window._sb;
      if (sb) await sb.auth.signOut();
      window.location.href = 'pedido.html';
    }

    async function loadAccount(user) {
      const sb = window._sb;
      window._user = user;

      // Set subtitle
      document.getElementById('account-subtitle').textContent = user.email;

      // Link orphan customers
      await sb.from('customers')
        .update({ auth_user_id: user.id })
        .eq('email', user.email)
        .is('auth_user_id', null);

      // Fetch customer row
      const { data: customers } = await sb.from('customers')
        .select('*')
        .eq('auth_user_id', user.id)
        .order('created_at', { ascending: false })
        .limit(1);

      const cust = customers && customers[0];
      if (cust) {
        document.getElementById('ac-name').value  = cust.name || '';
        document.getElementById('ac-phone').value = cust.phone || '';
      }
      document.getElementById('ac-email').value = user.email;

      // Fetch all customer IDs (may have multiple from guest orders)
      const { data: allCusts } = await sb.from('customers')
        .select('id')
        .eq('auth_user_id', user.id);
      const custIds = (allCusts || []).map(c => c.id);

      // Fetch orders
      let orders = [];
      if (custIds.length) {
        const { data: ordersData } = await sb.from('orders')
          .select('*, order_items(*), addresses(*)')
          .in('customer_id', custIds)
          .order('created_at', { ascending: false });
        orders = ordersData || [];
      }

      // Render orders
      const listEl  = document.getElementById('orders-list');
      const emptyEl = document.getElementById('orders-empty');
      if (orders.length === 0) {
        emptyEl.classList.remove('hidden');
      } else {
        listEl.innerHTML = orders.map((o, i) => renderOrder(o, i)).join('');
      }

      // Show content
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('account-content').classList.remove('hidden');
    }

    function showNoAuthState() {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('no-auth-state').classList.remove('hidden');
    }
  </script>

  <script src="i18n.js"></script>
  <script src="transicion.js"></script>
  <script src="cookie-consent.js" defer></script>

  <script type="module">
    import { supabase } from './js/supabase.js';
    window._sb = supabase;

    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      showNoAuthState();
    } else {
      loadAccount(user);
    }
  </script>

</body>
</html>
