    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

            const reader = ds.readable.getReader();

            while (true) {

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // preserve ordering (React before ReactDOM before Babel before text/babel).

    }

    console.error('Bundle unpack error:', err);

oMenu()\" class=\"w-full py-3.5 rounded-xl font-['Inter',sans-serif] font-medium text-[15px] leading-[1.5] text-[#9B8A72] bg-[#C4B08A]/30 cursor-not-allowed transition-all\">\n            Veure la carta i demanar\n          <\u002Fbutton>\n          <p class=\"text-xs text-center font-light text-[#9B8A72] mt-3\">Podràs triar les teves pizzes al següent pas<\u002Fp>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv><!-- /pp-card -->\n  <\u002Fmain>\n\n  <script>\n    function openOrderCard() {\n      const landing = document.getElementById('pp-landing');\n      const card    = document.getElementById('pp-card');\n      landing.style.opacity = '0';\n      setTimeout(() => {\n        landing.classList.add('hidden');\n        card.classList.remove('hidden');\n        card.style.opacity = '0';\n        card.style.transform = 'translateY(18px)';\n        card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';\n        requestAnimationFrame(() => requestAnimationFrame(() => {\n          card.style.opacity = '1';\n          card.style.transform = 'translateY(0)';\n        }));\n      }, 220);\n    }\n\n    let ppSelectedTime = null;\n    let ppZipValid     = false;\n    let _ppZipTimer    = null;\n\n    // Generate time slots: Cuanto antes + 20:30 → 23:30 every 15 min\n    const PP_SLOTS = ['Cuanto antes'];\n    for (let h = 20; h <= 23; h++) {\n      const startM = h === 20 ? 30 : 0;\n      for (let m = startM; m < 60; m += 15) {\n        if (h === 23 && m > 30) break;\n        PP_SLOTS.push(`${h}:${String(m).padStart(2,'0')}`);\n      }\n    }\n\n    let _slotCounts = {};\n\n    async function loadSlotCounts() {\n      if (!window.supabase) return;\n      const today = new Date().toISOString().split('T')[0];\n      const { data } = await window.supabase\n        .from('orders')\n        .select('slot_time, pizza_count')\n        .gte('created_at', today + 'T00:00:00+00:00')\n        .neq('status', 'cancelled');\n      if (!data) return;\n      _slotCounts = {};\n      data.forEach(row => {\n        if (!row.slot_time) return;\n        _slotCounts[row.slot_time] = (_slotCounts[row.slot_time] || 0) + (row.pizza_count || 0);\n      });\n    }\n\n    function resolveAsap() {\n      const now = new Date();\n      const nowMins = now.getHours() * 60 + now.getMinutes();\n      for (let i = 1; i < PP_SLOTS.length; i++) {\n        const s = PP_SLOTS[i];\n        const [h, m] = s.split(':').map(Number);\n        if (h * 60 + m > nowMins && (_slotCounts[s] || 0) < 6) return s;\n      }\n      return null;\n    }\n\n    function renderTimeSlots() {\n      const asap = resolveAsap();\n      const sel  = document.getElementById('pp-time-select');\n      let html   = '<option value=\"\" disabled selected>Tria una franja horària...<\u002Foption>';\n\n      if (asap) {\n        html += `<option value=\"cuanto-antes\">Cuanto antes<\u002Foption>`;\n      } else {\n        html += `<option value=\"\" disabled>Cuanto antes (sense disponibilitat)<\u002Foption>`;\n      }\n      html += `<option value=\"\" disabled>──────────────<\u002Foption>`;\n\n      PP_SLOTS.slice(1).forEach(s => {\n        const full = (_slotCounts[s] || 0) >= 6;\n        html += full\n          ? `<option value=\"\" disabled>${s} — Complet<\u002Foption>`\n          : `<option value=\"${s}\">${s}<\u002Foption>`;\n      });\n\n      sel.innerHTML = html;\n    }\n\n    function selectTimeFromSelect(val) {\n      const resolved = val === 'cuanto-antes' ? resolveAsap() : val;\n      ppSelectedTime = resolved || null;\n      validateForm();\n    }\n\n    function validateForm() {\n      const addr = (document.getElementById('pp-address').value || '').trim();\n      const ok   = !!(ppSelectedTime && addr.length > 0 && ppZipValid);\n      const btn  = document.getElementById('pp-cta');\n      btn.disabled = !ok;\n      btn.className = ok\n        ? \"w-full py-3.5 rounded-xl font-['Inter',sans-serif] font-medium text-[15px] leading-[1.5] text-[#F2E6CE] bg-[#E23F2E] shadow-sm hover:bg-[#B82A1F] transition-all cursor-pointer\"\n        : \"w-full py-3.5 rounded-xl font-['Inter',sans-serif] font-medium text-[15px] leading-[1.5] text-[#9B8A72] bg-[#C4B08A]/30 cursor-not-allowed transition-all\";\n    }\n\n    function onZipInput(val) {\n      clearTimeout(_ppZipTimer);\n      const clean  = val.replace(/\\s/g,'');\n      const zipEl  = document.getElementById('pp-zip');\n      const okEl   = document.getElementById('pp-zone-ok');\n      const errEl  = document.getElementById('pp-zone-err');\n      if (clean.length < 5) {\n        ppZipValid = false;\n        zipEl.style.borderColor = ''; zipEl.style.boxShadow = '';\n        okEl.classList.add('hidden'); errEl.classList.add('hidden');\n        validateForm();\n        return;\n      }\n      _ppZipTimer = setTimeout(() => validateZone(clean), 400);\n    }\n\n    async function validateZone(cp) {\n      if (!window.supabase) { ppZipValid = false; validateForm(); return; }\n      const zipEl  = document.getElementById('pp-zip');\n      const spinEl = document.getElementById('pp-zip-spinner');\n      const okEl   = document.getElementById('pp-zone-ok');\n      const errEl  = document.getElementById('pp-zone-err');\n      spinEl.classList.remove('hidden');\n      okEl.classList.add('hidden'); errEl.classList.add('hidden');\n      try {\n        const { data } = await window.supabase\n          .from('delivery_zones').select('id')\n          .eq('postal_code', cp).eq('active', true).maybeSingle();\n        if (data) {\n          ppZipValid = true;\n          zipEl.style.borderColor = 'rgba(16,185,129,0.7)';\n          zipEl.style.boxShadow   = '0 0 0 1px rgba(16,185,129,0.35)';\n          okEl.classList.remove('hidden');\n        } else {\n          ppZipValid = false;\n          zipEl.style.borderColor = '#E23F2E';\n          zipEl.style.boxShadow   = '0 0 0 1px rgba(226,63,46,0.3)';\n          errEl.classList.remove('hidden');\n        }\n      } catch(e) {\n        console.warn('[validateZone]', e);\n        ppZipValid = false;\n        errEl.classList.remove('hidden');\n      } finally {\n        spinEl.classList.add('hidden');\n        validateForm();\n      }\n    }\n\n    function goToMenu() {\n      if (!ppSelectedTime || !ppZipValid) return;\n      sessionStorage.setItem('micsas_time',    ppSelectedTime);\n      sessionStorage.setItem('micsas_address', document.getElementById('pp-address').value.trim());\n      sessionStorage.setItem('micsas_zip',     document.getElementById('pp-zip').value.trim());\n      sessionStorage.setItem('micsas_floor',   document.getElementById('pp-floor').value.trim());\n      window.location.href = 'pedido.html';\n    }\n\n    // Render slots immediately (no counts yet), then reload once Supabase is ready\n    renderTimeSlots();\n\n    function initPlaces() {\n      const input = document.getElementById('pp-address');\n      try {\n        const ac = new google.maps.places.Autocomplete(input, {\n          componentRestrictions: { country: 'es' },\n          fields: ['address_components', 'formatted_address'],\n          types: ['address'],\n        });\n        ac.addListener('place_changed', () => {\n          const place = ac.getPlace();\n          if (!place || !place.address_components) { validateForm(); return; }\n          input.value = place.formatted_address || input.value;\n          const postalComp = place.address_components.find(c => c.types.includes('postal_code'));\n          if (postalComp) {\n            document.getElementById('pp-zip').value = postalComp.long_name;\n            validateZone(postalComp.long_name);\n          }\n          validateForm();\n        });\n      } catch(e) { console.warn('[Places]', e); }\n    }\n  <\u002Fscript>\n\n  <script src=\"32ffdce1-8e6a-4902-b161-a7c152a4f990\" async=\"\" defer=\"\"><\u002Fscript>\n\n  <!-- ════ PROFILE PANEL ════ -->\n  <div id=\"pp-profile-panel\" class=\"hidden fixed inset-0 z-[820] bg-[#DDD0B3] flex flex-col translate-x-full transition-transform duration-300 ease-out\">\n\n    <!-- Header -->\n    <div class=\"shrink-0 flex items-center px-5 py-4 border-b border-[#C4B08A]/30 bg-[#DDD0B3]\">\n      <button onclick=\"closeProfilePanel()\" class=\"flex items-center gap-1.5 text-[#2A1A0F] hover:text-[#E23F2E] transition-colors p-1 rounded-lg\">\n        <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M12 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg>\n        <span class=\"text-sm font-medium font-['Inter',sans-serif]\">Enrere<\u002Fspan>\n      <\u002Fbutton>\n      <h1 class=\"font-['Lilita_One'] tracking-tight text-xl text-[#2A1A0F] mx-auto\">El meu compte<\u002Fh1>\n    <\u002Fdiv>\n\n    <!-- Avatar + name -->\n    <div class=\"shrink-0 flex flex-col items-center pt-8 pb-5 px-6\">\n      <div class=\"w-20 h-20 rounded-full bg-[#E23F2E] flex items-center justify-center mb-3\">\n        <span id=\"pp-prof-initials\" class=\"font-['Lilita_One'] text-3xl text-[#F2E6CE]\">?<\u002Fspan>\n      <\u002Fdiv>\n      <p id=\"pp-prof-name\" class=\"font-['Lilita_One'] text-2xl text-[#2A1A0F]\">—<\u002Fp>\n      <p id=\"pp-prof-email\" class=\"text-sm font-light text-[#5A3E28] mt-0.5\"><\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Tabs -->\n    <div class=\"shrink-0 flex border-b border-[#C4B08A]/30 px-6\">\n      <button id=\"pp-tab-perfil\" onclick=\"showProfileTab('perfil')\" class=\"py-3 pr-6 text-sm font-medium border-b-2 border-[#E23F2E] text-[#E23F2E] transition-colors font-['Inter',sans-serif]\">\n        Perfil\n      <\u002Fbutton>\n      <button id=\"pp-tab-historial\" onclick=\"showProfileTab('historial')\" class=\"py-3 px-6 text-sm font-medium text-[#9B8A72] transition-colors font-['Inter',sans-serif]\">\n        Historial de pedidos\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Content -->\n    <div class=\"flex-1 overflow-y-auto\">\n\n      <!-- Perfil tab -->\n      <div id=\"pp-section-perfil\" class=\"px-6 py-6 space-y-0 max-w-lg mx-auto\">\n        <div class=\"bg-[#F2E6CE] rounded-2xl border border-[#C4B08A]/30 overflow-hidden divide-y divide-[#C4B08A]/20\">\n          <div class=\"px-5 py-4\">\n            <p class=\"text-[10px] font-semibold uppercase tracking-widest text-[#9B8A72] mb-1\">Nom<\u002Fp>\n            <p id=\"pp-prof-name-row\" class=\"text-sm text-[#2A1A0F] font-medium\">—<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"px-5 py-4\">\n            <p class=\"text-[10px] font-semibold uppercase tracking-widest text-[#9B8A72] mb-1\">Correu<\u002Fp>\n            <p id=\"pp-prof-email-row\" class=\"text-sm text-[#2A1A0F]\">—<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"px-5 py-4\">\n            <p class=\"text-[10px] font-semibold uppercase tracking-widest text-[#9B8A72] mb-1\">Telèfon<\u002Fp>\n            <p id=\"pp-prof-phone\" class=\"text-sm text-[#2A1A0F]\">—<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"text-xs text-center text-[#9B8A72] pt-4 font-light\">Per modificar les teves dades, contacta'ns per Instagram.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Historial tab -->\n      <div id=\"pp-section-historial\" class=\"hidden px-6 py-6 max-w-lg mx-auto\">\n        <div id=\"pp-order-list\" class=\"space-y-3\">\n          <p class=\"text-sm text-[#9B8A72] text-center py-8\">Carregant...<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════ LOGIN MODAL ════ -->\n  <div id=\"login-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"pp-login-title\" class=\"fixed inset-0 z-[810] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200 hidden\">\n    <div class=\"absolute inset-0 bg-[#2A1A0F]/40 backdrop-blur-sm\" onclick=\"closeLoginModal()\"><\u002Fdiv>\n    <div class=\"relative w-full max-w-sm bg-[#F2E6CE] rounded-2xl shadow-2xl border border-[#C4B08A]/30 p-6 z-10\">\n      <button onclick=\"closeLoginModal()\" aria-label=\"Tancar\" class=\"absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#E6D5B0]/60 text-[#9B8A72] hover:text-[#2A1A0F] transition-colors\">\n        <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <div id=\"pp-login-form-view\">\n        <h2 id=\"pp-login-title\" class=\"font-['Lilita_One'] tracking-tight text-2xl text-[#2A1A0F] mb-1\">Inicia sessió<\u002Fh2>\n        <p class=\"text-sm font-light text-[#5A3E28] mb-5 leading-relaxed\">T'enviarem un enllaç al teu correu per entrar sense contrasenya.<\u002Fp>\n        <div class=\"space-y-4\">\n          <div>\n            <label for=\"pp-login-email\" class=\"block text-xs font-medium mb-1.5 text-[#2A1A0F]\">Correu electrònic<\u002Flabel>\n            <input id=\"pp-login-email\" type=\"email\" autocomplete=\"email\" placeholder=\"correu@exemple.com\" class=\"w-full bg-[#E6D5B0]/20 border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-[#2A1A0F] text-sm outline-none transition-all placeholder:text-[#9B8A72] focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]\" onkeydown=\"if(event.key==='Enter') sendMagicLink()\">\n          <\u002Fdiv>\n          <p id=\"pp-login-err\" class=\"hidden text-xs text-[#E23F2E]\"><\u002Fp>\n          <button onclick=\"sendMagicLink()\" id=\"pp-login-send-btn\" class=\"w-full py-3 rounded-full font-['Inter',sans-serif] font-medium text-[15px] text-[#F2E6CE] bg-[#E23F2E] hover:bg-[#B82A1F] transition-all shadow-sm\">\n            Enviar enllaç\n          <\u002Fbutton>\n          <button onclick=\"closeLoginModal()\" class=\"w-full py-3 rounded-full font-['Inter',sans-serif] font-medium text-[15px] text-[#5A3E28] border border-[#C4B08A]/40 hover:bg-[#E6D5B0]/30 transition-all\">\n            Cancel·lar\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"pp-login-ok-view\" class=\"hidden text-center py-2\">\n        <div class=\"w-16 h-16 rounded-full bg-[#10B981]/10 text-[#10B981] flex items-center justify-center mx-auto mb-4\">\n          <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 11.08V12a10 10 0 1 1-5.93-9.14\"><\u002Fpath><polyline points=\"22 4 12 14.01 9 11.01\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 class=\"font-['Lilita_One'] tracking-tight text-2xl text-[#2A1A0F] mb-2\">Hem enviat l'enllaç!<\u002Fh2>\n        <p class=\"text-sm font-light text-[#5A3E28] mb-1\">Hem enviat un enllaç a <strong id=\"pp-login-sent-email\" class=\"font-medium text-[#2A1A0F]\"><\u002Fstrong><\u002Fp>\n        <p class=\"text-sm font-light text-[#5A3E28] mb-6\">Obre el teu correu i clica per entrar.<\u002Fp>\n        <button onclick=\"closeLoginModal()\" class=\"px-6 py-3 rounded-full font-['Inter',sans-serif] font-medium text-[15px] text-[#F2E6CE] bg-[#2A1A0F] hover:bg-[#1a1009] transition-all\">\n          D'acord\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    let ppCurrentUser = null;\n    let ppCustomer = null;\n\n    function updateNavAuth() {\n      const loginBtn   = document.getElementById('nav-login-btn');\n      const userWrap   = document.getElementById('nav-user-wrap');\n      const userName   = document.getElementById('nav-user-name');\n      const profileBtn = document.getElementById('pp-profile-btn');\n      if (ppCurrentUser) {\n        if (loginBtn)   loginBtn.classList.add('hidden');\n        if (userWrap)   { userWrap.classList.remove('hidden'); userWrap.classList.add('flex'); }\n        const displayName = ppCustomer?.name || ppCurrentUser.email.split('@')[0];\n        if (userName)   userName.textContent = displayName;\n        if (profileBtn) profileBtn.classList.remove('hidden');\n      } else {\n        if (loginBtn)   loginBtn.classList.remove('hidden');\n        if (userWrap)   { userWrap.classList.add('hidden'); userWrap.classList.remove('flex'); }\n        if (profileBtn) profileBtn.classList.add('hidden');\n      }\n    }\n\n    async function doSignOut() {\n      if (!window.supabase) return;\n      await window.supabase.auth.signOut();\n      ppCurrentUser = null; ppCustomer = null;\n      updateNavAuth();\n    }\n\n    // ── Profile panel ──\n\n    function openProfilePanel() {\n      const panel = document.getElementById('pp-profile-panel');\n      panel.classList.remove('hidden');\n      requestAnimationFrame(() => requestAnimationFrame(() => panel.classList.remove('translate-x-full')));\n      document.body.style.overflow = 'hidden';\n      showProfileTab('perfil');\n      loadProfileData();\n    }\n\n    function closeProfilePanel() {\n      const panel = document.getElementById('pp-profile-panel');\n      panel.classList.add('translate-x-full');\n      setTimeout(() => panel.classList.add('hidden'), 300);\n      document.body.style.overflow = '';\n    }\n\n    function showProfileTab(tab) {\n      ['perfil','historial'].forEach(t => {\n        document.getElementById('pp-tab-' + t).classList.toggle('border-b-2', t === tab);\n        document.getElementById('pp-tab-' + t).classList.toggle('border-[#E23F2E]', t === tab);\n        document.getElementById('pp-tab-' + t).classList.toggle('text-[#E23F2E]', t === tab);\n        document.getElementById('pp-tab-' + t).classList.toggle('text-[#9B8A72]', t !== tab);\n        document.getElementById('pp-section-' + t).classList.toggle('hidden', t !== tab);\n      });\n      if (tab === 'historial') loadOrderHistory();\n    }\n\n    async function loadProfileData() {\n      if (!window.supabase || !ppCurrentUser) return;\n      const { data } = await window.supabase\n        .from('customers').select('*')\n        .eq('auth_user_id', ppCurrentUser.id)\n        .order('created_at', { ascending: false }).limit(1).maybeSingle();\n      ppCustomer = data;\n      const name = data?.name || '—';\n      ['pp-prof-name','pp-prof-name-row'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = name; });\n      ['pp-prof-email','pp-prof-email-row'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = ppCurrentUser.email; });\n      const phoneEl = document.getElementById('pp-prof-phone'); if (phoneEl) phoneEl.textContent = data?.phone || '—';\n      const initEl  = document.getElementById('pp-prof-initials'); if (initEl) initEl.textContent = name.charAt(0).toUpperCase();\n      updateNavAuth();\n    }\n\n    async function loadOrderHistory() {\n      const listEl = document.getElementById('pp-order-list');\n      if (!listEl || !window.supabase || !ppCurrentUser) return;\n      listEl.innerHTML = '<p class=\"text-sm text-[#9B8A72] text-center py-8\">Carregant...<\u002Fp>';\n      const { data: cust } = await window.supabase\n        .from('customers').select('id')\n        .eq('auth_user_id', ppCurrentUser.id).limit(1).maybeSingle();\n      if (!cust) { listEl.innerHTML = '<p class=\"text-sm text-[#9B8A72] text-center py-8\">Cap comanda trobada.<\u002Fp>'; return; }\n\n      const { data: orders } = await window.supabase\n        .from('orders').select('*, order_items(*)')\n        .eq('customer_id', cust.id)\n        .order('created_at', { ascending: false })\n        .limit(20);\n\n      if (!orders || orders.length === 0) {\n        listEl.innerHTML = '<p class=\"text-sm text-[#9B8A72] text-center py-8\">Encara no tens cap comanda.<\u002Fp>';\n        return;\n      }\n\n      const statusLabel = { pending:'Pendent', confirmed:'Confirmada', delivered:'Entregada', cancelled:'Cancel·lada' };\n      const statusColor = { pending:'text-[#F59E0B]', confirmed:'text-[#10B981]', delivered:'text-[#10B981]', cancelled:'text-[#E23F2E]' };\n\n      listEl.innerHTML = orders.map(o => {\n        const date = new Date(o.created_at).toLocaleDateString('ca-ES', { day:'2-digit', month:'short', year:'numeric' });\n        const items = (o.order_items || []).map(i => `${i.quantity || i.qty || 1}× ${i.name || i.item_name || i.product_name || ''}`).filter(Boolean);\n        return `\n          <div class=\"rounded-xl border border-[#C4B08A]/30 bg-[#E6D5B0]/20 px-4 py-4 space-y-2\">\n            <div class=\"flex items-center justify-between gap-2\">\n              <span class=\"text-xs font-light text-[#9B8A72]\">${date}<\u002Fspan>\n              <span class=\"text-xs font-medium ${statusColor[o.status] || 'text-[#9B8A72]'}\">${statusLabel[o.status] || o.status || ''}<\u002Fspan>\n            <\u002Fdiv>\n            ${items.length ? `<p class=\"text-sm text-[#2A1A0F] font-light\">${items.join(', ')}<\u002Fp>` : ''}\n            ${o.slot_time ? `<p class=\"text-xs text-[#9B8A72]\">Hora: ${o.slot_time}<\u002Fp>` : ''}\n            <div class=\"flex justify-between items-center pt-1 border-t border-[#C4B08A]/20\">\n              <span class=\"text-xs font-light text-[#5A3E28]\">${o.payment_method === 'cash' ? 'Efectiu' : 'Targeta'}<\u002Fspan>\n              <span class=\"font-['Lilita_One'] text-base text-[#E23F2E]\">€${(o.total || 0).toFixed(2).replace('.',',')}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>`;\n      }).join('');\n    }\n\n    function openLoginModal() {\n      document.getElementById('pp-login-form-view').classList.remove('hidden');\n      document.getElementById('pp-login-ok-view').classList.add('hidden');\n      document.getElementById('pp-login-email').value = '';\n      document.getElementById('pp-login-err').classList.add('hidden');\n      document.getElementById('pp-login-send-btn').disabled = false;\n      document.getElementById('pp-login-send-btn').textContent = 'Enviar enllaç';\n      const m = document.getElementById('login-modal');\n      m.classList.remove('hidden');\n      setTimeout(() => { m.classList.remove('opacity-0', 'pointer-events-none'); document.getElementById('pp-login-email').focus(); }, 10);\n    }\n\n    function closeLoginModal() {\n      const m = document.getElementById('login-modal');\n      m.classList.add('opacity-0', 'pointer-events-none');\n      setTimeout(() => m.classList.add('hidden'), 200);\n    }\n\n    async function sendMagicLink() {\n      const emailVal = document.getElementById('pp-login-email').value.trim();\n      const errEl = document.getElementById('pp-login-err');\n      if (!emailVal || !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(emailVal)) {\n        errEl.textContent = 'Introdueix un correu vàlid.'; errEl.classList.remove('hidden'); return;\n      }\n      errEl.classList.add('hidden');\n      const btn = document.getElementById('pp-login-send-btn');\n      btn.disabled = true; btn.textContent = 'Enviant...';\n      const { error } = await window.supabase.auth.signInWithOtp({\n        email: emailVal,\n        options: { emailRedirectTo: window.location.origin + '/pre-pedido.html' }\n      });\n      if (error) {\n        errEl.textContent = \"Error en enviar l'enllaç.\"; errEl.classList.remove('hidden');\n        btn.disabled = false; btn.textContent = 'Enviar enllaç';\n      } else {\n        document.getElementById('pp-login-sent-email').textContent = emailVal;\n        document.getElementById('pp-login-form-view').classList.add('hidden');\n        document.getElementById('pp-login-ok-view').classList.remove('hidden');\n      }\n    }\n\n    async function initAuth() {\n      const sb = window.supabase; if (!sb) return;\n      const { data: { user } } = await sb.auth.getUser();\n      if (user) { ppCurrentUser = user; await loadProfileData(); updateNavAuth(); }\n      sb.auth.onAuthStateChange(async (event, session) => {\n        if (event === 'SIGNED_IN' && session?.user) {\n          ppCurrentUser = session.user; await loadProfileData(); updateNavAuth(); closeLoginModal();\n        } else if (event === 'SIGNED_OUT') {\n          ppCurrentUser = null; ppCustomer = null; updateNavAuth();\n        }\n      });\n    }\n\n    document.addEventListener('keydown', e => {\n      if (e.key === 'Escape') {\n        if (!document.getElementById('pp-profile-panel').classList.contains('hidden')) closeProfilePanel();\n        else if (!document.getElementById('login-modal').classList.contains('hidden')) closeLoginModal();\n      }\n    });\n  <\u002Fscript>\n\n  \n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
