<!DOCTYPE html>
<html lang="ca" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quan i on · micsas.ff</title>
  <meta name="description" content="Tria quan vols rebre la teva pizza i on te la portem.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="transicion.css">
  <link rel="dns-prefetch" href="https://hoirqrkdgbmvpwutwuwj.supabase.co">
  <link rel="prefetch" href="pedido.html">
  <style>
    .slot-btn.selected {
      border-color: #E23F2E !important;
      background-color: rgba(226,63,46,0.08);
      color: #E23F2E !important;
    }
    .pac-container {
      background: #F2E6CE;
      border: 1px solid rgba(196,176,138,0.4);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(42,26,15,0.12);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      margin-top: 4px;
      overflow: hidden;
      z-index: 9999 !important;
    }
    .pac-item {
      padding: 10px 16px;
      color: #2A1A0F;
      border-top: 1px solid rgba(196,176,138,0.2);
      cursor: pointer;
    }
    .pac-item:first-child { border-top: none; }
    .pac-item:hover, .pac-item-selected { background: rgba(230,213,176,0.3); }
    .pac-item-query { color: #2A1A0F; font-weight: 500; }
    .pac-matched { color: #E23F2E; }
    .pac-icon { display: none; }
  </style>
</head>
<body class="bg-[#DDD0B3] text-[#2A1A0F] font-['DM_Sans',sans-serif] antialiased selection:bg-[#E23F2E]/20">

  <!-- NAV -->
  <nav class="sticky top-0 z-40 px-6 py-4 md:px-12 flex justify-between items-center bg-[#DDD0B3]/95 backdrop-blur-md border-b border-[#C4B08A]/40 shadow-sm">
    <a href="index.html" class="font-['Lilita_One'] tracking-tighter text-2xl text-[#2A1A0F] hover:text-[#E23F2E] transition-colors">
      micsas.ff
    </a>
    <a href="carta.html" class="flex items-center gap-1.5 text-sm font-medium text-[#5A3E28] hover:text-[#E23F2E] transition-colors px-4 py-2 rounded-full border border-[#C4B08A]/40 hover:border-[#E23F2E]/40">
      <iconify-icon icon="solar:arrow-left-linear" width="16" style="stroke-width:1.5;"></iconify-icon>
      Tornar
    </a>
  </nav>

  <!-- MAIN -->
  <main class="min-h-[calc(100dvh-65px)] flex items-center justify-center px-4 py-10 md:py-14">
    <div class="w-full max-w-md bg-[#F2E6CE] rounded-2xl shadow-xl border border-[#C4B08A]/30 overflow-hidden">

      <!-- Card header -->
      <div class="px-6 pt-7 pb-5 border-b border-[#C4B08A]/20">
        <h1 class="font-['Lilita_One'] tracking-tight text-2xl text-[#2A1A0F] mb-0.5">Quan i on et portem la pizza?</h1>
        <p class="text-sm font-light text-[#5A3E28]">Tria la franja i afegeix la teva adreça</p>
      </div>

      <div class="px-6 py-5 space-y-5">

        <!-- Time -->
        <div>
          <label for="pp-time-select" class="block text-xs font-semibold uppercase tracking-widest text-[#2A1A0F] mb-2">Quan vols rebre-la?</label>
          <div class="relative">
            <select id="pp-time-select" onchange="selectTimeFromSelect(this.value)"
              class="w-full appearance-none bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 pr-10 text-[#2A1A0F] text-sm outline-none focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E] transition-all cursor-pointer">
              <option value="" disabled selected>Tria una franja horària...</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-[#9B8A72]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
        </div>

        <div class="border-t border-[#C4B08A]/20"></div>

        <!-- Address -->
        <div class="space-y-3">
          <p class="text-xs font-semibold uppercase tracking-widest text-[#2A1A0F]">On la portem?</p>

          <div>
            <label for="pp-address" class="block text-xs font-medium mb-1.5 text-[#5A3E28]">
              Adreça <span class="text-[#E23F2E]">*</span>
            </label>
            <input id="pp-address" type="text" autocomplete="off" placeholder="Carrer i número"
              class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-[#2A1A0F] text-sm outline-none transition-all placeholder:text-[#9B8A72] focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]"
              oninput="validateForm()">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label for="pp-floor" class="block text-xs font-medium mb-1.5 text-[#5A3E28]">
                Pis / Porta <span class="text-[#9B8A72] font-normal">(opcional)</span>
              </label>
              <input id="pp-floor" type="text" autocomplete="address-line2" placeholder="2n 1a"
                class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 text-[#2A1A0F] text-sm outline-none transition-all placeholder:text-[#9B8A72] focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]">
            </div>
            <div>
              <label for="pp-zip" class="block text-xs font-medium mb-1.5 text-[#5A3E28]">
                Codi postal <span class="text-[#E23F2E]">*</span>
              </label>
              <div class="relative">
                <input id="pp-zip" type="text" autocomplete="postal-code" placeholder="08230" maxlength="5"
                  class="w-full bg-white border border-[#C4B08A]/40 rounded-xl px-4 py-3 pr-9 text-[#2A1A0F] text-sm outline-none transition-all placeholder:text-[#9B8A72] focus:border-[#E23F2E] focus:ring-1 focus:ring-[#E23F2E]"
                  oninput="onZipInput(this.value)">
                <div id="pp-zip-spinner" class="hidden absolute right-3 inset-y-0 flex items-center pointer-events-none">
                  <svg class="animate-spin w-4 h-4 text-[#9B8A72]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                  </svg>
                </div>
              </div>
              <p id="pp-zone-ok"  class="hidden text-xs mt-1.5 text-[#10B981]">Repartim a aquesta zona ✓</p>
              <p id="pp-zone-err" class="hidden text-xs mt-1.5 text-[#E23F2E]">No fem entregues a aquesta zona.</p>
            </div>
          </div>
        </div>

        <!-- CTA -->
        <div class="pt-1">
          <button id="pp-cta" disabled onclick="goToMenu()"
            class="w-full py-3.5 rounded-xl font-['Inter',sans-serif] font-medium text-[15px] leading-[1.5] text-[#9B8A72] bg-[#C4B08A]/30 cursor-not-allowed transition-all">
            Veure la carta i demanar
          </button>
          <p class="text-xs text-center font-light text-[#9B8A72] mt-3">Podràs triar les teves pizzes al següent pas</p>
        </div>

      </div>
    </div>
  </main>

  <script>
    let ppSelectedTime = null;
    let ppZipValid     = false;
    let _ppZipTimer    = null;

    // Generate time slots: Cuanto antes + 20:30 → 23:30 every 15 min
    const PP_SLOTS = ['Cuanto antes'];
    for (let h = 20; h <= 23; h++) {
      const startM = h === 20 ? 30 : 0;
      for (let m = startM; m < 60; m += 15) {
        if (h === 23 && m > 30) break;
        PP_SLOTS.push(`${h}:${String(m).padStart(2,'0')}`);
      }
    }

    let _slotCounts = {};

    async function loadSlotCounts() {
      if (!window.supabase) return;
      const today = new Date().toISOString().split('T')[0];
      const { data } = await window.supabase
        .from('orders')
        .select('slot_time, pizza_count')
        .gte('created_at', today + 'T00:00:00+00:00')
        .neq('status', 'cancelled');
      if (!data) return;
      _slotCounts = {};
      data.forEach(row => {
        if (!row.slot_time) return;
        _slotCounts[row.slot_time] = (_slotCounts[row.slot_time] || 0) + (row.pizza_count || 0);
      });
    }

    function resolveAsap() {
      const now = new Date();
      const nowMins = now.getHours() * 60 + now.getMinutes();
      for (let i = 1; i < PP_SLOTS.length; i++) {
        const s = PP_SLOTS[i];
        const [h, m] = s.split(':').map(Number);
        if (h * 60 + m > nowMins && (_slotCounts[s] || 0) < 6) return s;
      }
      return null;
    }

    function renderTimeSlots() {
      const asap = resolveAsap();
      const sel  = document.getElementById('pp-time-select');
      let html   = '<option value="" disabled selected>Tria una franja horària...</option>';

      if (asap) {
        html += `<option value="cuanto-antes">Cuanto antes</option>`;
      } else {
        html += `<option value="" disabled>Cuanto antes (sense disponibilitat)</option>`;
      }
      html += `<option value="" disabled>──────────────</option>`;

      PP_SLOTS.slice(1).forEach(s => {
        const full = (_slotCounts[s] || 0) >= 6;
        html += full
          ? `<option value="" disabled>${s} — Complet</option>`
          : `<option value="${s}">${s}</option>`;
      });

      sel.innerHTML = html;
    }

    function selectTimeFromSelect(val) {
      const resolved = val === 'cuanto-antes' ? resolveAsap() : val;
      ppSelectedTime = resolved || null;
      validateForm();
    }

    function validateForm() {
      const addr = (document.getElementById('pp-address').value || '').trim();
      const ok   = !!(ppSelectedTime && addr.length > 0 && ppZipValid);
      const btn  = document.getElementById('pp-cta');
      btn.disabled = !ok;
      btn.className = ok
        ? "w-full py-4 rounded-full font-['Inter',sans-serif] font-medium text-[16px] leading-[1.5] text-[#F2E6CE] bg-[#E23F2E] shadow-sm hover:bg-[#B82A1F] hover:-translate-y-0.5 transition-all cursor-pointer"
        : "w-full py-4 rounded-full font-['Inter',sans-serif] font-medium text-[16px] leading-[1.5] text-[#9B8A72] bg-[#C4B08A]/30 cursor-not-allowed transition-all";
    }

    function onZipInput(val) {
      clearTimeout(_ppZipTimer);
      const clean  = val.replace(/\s/g,'');
      const zipEl  = document.getElementById('pp-zip');
      const okEl   = document.getElementById('pp-zone-ok');
      const errEl  = document.getElementById('pp-zone-err');
      if (clean.length < 5) {
        ppZipValid = false;
        zipEl.style.borderColor = ''; zipEl.style.boxShadow = '';
        okEl.classList.add('hidden'); errEl.classList.add('hidden');
        validateForm();
        return;
      }
      _ppZipTimer = setTimeout(() => validateZone(clean), 400);
    }

    async function validateZone(cp) {
      if (!window.supabase) { ppZipValid = false; validateForm(); return; }
      const zipEl  = document.getElementById('pp-zip');
      const spinEl = document.getElementById('pp-zip-spinner');
      const okEl   = document.getElementById('pp-zone-ok');
      const errEl  = document.getElementById('pp-zone-err');
      spinEl.classList.remove('hidden');
      okEl.classList.add('hidden'); errEl.classList.add('hidden');
      try {
        const { data } = await window.supabase
          .from('delivery_zones').select('id')
          .eq('postal_code', cp).eq('active', true).maybeSingle();
        if (data) {
          ppZipValid = true;
          zipEl.style.borderColor = 'rgba(16,185,129,0.7)';
          zipEl.style.boxShadow   = '0 0 0 1px rgba(16,185,129,0.35)';
          okEl.classList.remove('hidden');
        } else {
          ppZipValid = false;
          zipEl.style.borderColor = '#E23F2E';
          zipEl.style.boxShadow   = '0 0 0 1px rgba(226,63,46,0.3)';
          errEl.classList.remove('hidden');
        }
      } catch(e) {
        console.warn('[validateZone]', e);
        ppZipValid = false;
        errEl.classList.remove('hidden');
      } finally {
        spinEl.classList.add('hidden');
        validateForm();
      }
    }

    function goToMenu() {
      if (!ppSelectedTime || !ppZipValid) return;
      sessionStorage.setItem('micsas_time',    ppSelectedTime);
      sessionStorage.setItem('micsas_address', document.getElementById('pp-address').value.trim());
      sessionStorage.setItem('micsas_zip',     document.getElementById('pp-zip').value.trim());
      sessionStorage.setItem('micsas_floor',   document.getElementById('pp-floor').value.trim());
      window.location.href = 'pedido.html';
    }

    // Render slots immediately (no counts yet), then reload once Supabase is ready
    renderTimeSlots();

    function initPlaces() {
      const input = document.getElementById('pp-address');
      try {
        const ac = new google.maps.places.Autocomplete(input, {
          componentRestrictions: { country: 'es' },
          fields: ['address_components', 'formatted_address'],
          types: ['address'],
        });
        ac.addListener('place_changed', () => {
          const place = ac.getPlace();
          if (!place || !place.address_components) { validateForm(); return; }
          input.value = place.formatted_address || input.value;
          const postalComp = place.address_components.find(c => c.types.includes('postal_code'));
          if (postalComp) {
            document.getElementById('pp-zip').value = postalComp.long_name;
            validateZone(postalComp.long_name);
          }
          validateForm();
        });
      } catch(e) { console.warn('[Places]', e); }
    }
  </script>

  <script type="module">
    import { supabase } from './js/supabase.js';
    window.supabase = supabase;
    await loadSlotCounts();
    renderTimeSlots();
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCbMHwFSwFTlyXhGXQe7CZFGF7Jcl_FORg&libraries=places&callback=initPlaces" async defer></script>
  <script src="transicion.js"></script>

</body>
</html>
